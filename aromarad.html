  .controls { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:12px 0 4px; }
  .controls button { border:1px solid var(--btnborder); background:var(--btnbg); color:var(--ink);
    padding:7px 16px; border-radius:999px; font-size:14px; cursor:pointer; transition:.15s; }
  .controls button:hover { border-color:#999; }
  .controls button.active { background:var(--ink); color:var(--bg); border-color:var(--ink); }
  .crumb { min-height:24px; text-align:center; margin:6px 0 0; font-size:14px; font-weight:600; }
  .crumb .sep { color:#bbb; font-weight:400; margin:0 5px; }
  .crumb .clear { color:var(--muted); font-weight:400; font-size:12px; margin-left:10px;
    cursor:pointer; text-decoration:underline; }
  .wrap { width:100%; max-width:900px; margin:0 auto; padding:4px 10px 24px; }
  .stage { position:relative; width:100%; aspect-ratio:1/1; overflow:hidden;
    border-radius:12px; touch-action:none; }
  svg { width:100%; height:100%; display:block; cursor:grab; }
  svg.grabbing { cursor:grabbing; }
  .seg { stroke:#fff; stroke-width:1; cursor:pointer; transition:opacity .18s; }
  .seg:hover { opacity:.82; }
  .lbl,.lbl-cat,.lbl-sub { transition:opacity .18s; }
  .lbl { fill:#1f1f1f; pointer-events:none; }
  .lbl-cat { fill:#fff; font-weight:700; pointer-events:none; }
  .lbl-sub { fill:#2b2b2b; font-weight:600; pointer-events:none; }
  .dim { opacity:.13 !important; }
  #hub { fill:var(--hub); stroke:var(--line); }
  text.hubt { fill:var(--hubink); }
  text.hubs { fill:var(--hubsub); }
  .zoom { position:absolute; right:10px; bottom:10px; display:flex; flex-direction:column; gap:6px; }
  .zoom button { width:38px; height:38px; border:1px solid var(--zborder); background:var(--zbg);

    box-shadow:0 1px 3px rgba(0,0,0,.12); display:flex; align-items:center; justify-content:center; }
  .zoom button:hover { border-color:#999; }
  .hint { color:var(--muted); font-size:11px; text-align:center; margin-top:8px; }
  .count { color:var(--muted); font-size:12px; text-align:center; margin-top:2px; }

function measure(txt,size,weight){ _c.font=(weight||'400')+' '+size+'px '+FONTFAM; return _c.measureText(txt).width||1; }
function sizeFor(txt,budget,weight){ return budget*10/measure(txt,10,weight); }
function polar(r,a){ return [CX+r*Math.cos(a), CY+r*Math.sin(a)]; }
function arcPath(r0,r1,a0,a1){
  const [x0,y0]=polar(r1,a0),[x1,y1]=polar(r1,a1);
  const [x2,y2]=polar(r0,a1),[x3,y3]=polar(r0,a0);
  const large=(a1-a0)>Math.PI?1:0;
  return `M${x0} ${y0} A${r1} ${r1} 0 ${large} 1 ${x1} ${y1} L${x2} ${y2} A${r0} ${r0} 0 ${large} 0 ${x3} ${y3} Z`;
}
function mk(tag,attrs,text){
  const e=document.createElementNS(SVG_NS,tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]);
  if(text!=null) e.textContent=text;
  return e;
}
function lighten(hex,t){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.round(r+(255-r)*t); g=Math.round(g+(255-g)*t); b=Math.round(b+(255-b)*t);
  return `rgb(${r},${g},${b})`;
}

  if(leaf) e.setAttribute('data-leaf',leaf);

}
function curvedAt(rMid,a0,a1,txt,cls,weight,size){
  const mid=(a0+a1)/2, flip=(mid>0&&mid<Math.PI);

  defsLayer.appendChild(mk('path',{id:id,d:d,fill:'none'}));
  const t=mk('text',{class:cls,'font-size':size.toFixed(2),'text-anchor':'middle','dominant-baseline':'middle'});
  t.appendChild(mk('textPath',{href:'#'+id,startOffset:'50%'},txt));

}
function radialAt(rMid,angle,txt,cls,weight,size){
  let deg=angle*180/Math.PI;

}
function bandLabel(rIn,rOut,a0,a1,txt,cls,weight,target){
  const rMid=(rIn+rOut)/2, band=rOut-rIn, mid=(a0+a1)/2;
  const arc=(a1-a0)*rMid;
  if(measure(txt,target,weight)<=arc*0.90 && target<=band*0.82)
    return curvedAt(rMid,a0,a1,txt,cls,weight,target);
  if(measure(txt,target,weight)<=band*0.90 && target<=arc*0.92)
    return radialAt(rMid,mid,txt,cls,weight,target);
  const sT=Math.min(sizeFor(txt,arc*0.90,weight), band*0.82);
  const sR=Math.min(sizeFor(txt,band*0.90,weight), arc*0.92);
  if(sR>=sT) return radialAt(rMid,mid,txt,cls,weight,Math.max(MIN_SIZE,sR));
  return curvedAt(rMid,a0,a1,txt,cls,weight,Math.max(MIN_SIZE,sT));
}
function leafLabel(rIn,rOut,angle,txt){
  const budget=(rOut-rIn)-6;
  let size=Math.min(LEAF_SIZE, sizeFor(txt,budget,'400'));
  size=Math.max(MIN_SIZE,size);
  let deg=angle*180/Math.PI, anchor='start';
  if(deg>90&&deg<270){ deg+=180; anchor='end'; }
  const r=(deg>90&&deg<270)? rOut-3 : rIn+3;
  const [x,y]=polar(r,angle);
  return mk('text',{x:x,y:y,class:'lbl','font-size':size.toFixed(2),'text-anchor':anchor,
    'dominant-baseline':'middle',transform:`rotate(${deg} ${x} ${y})`},txt);
}
function render(filter){
  wheel.innerHTML=''; uid=0; sel=null; updateCrumb();
  defsLayer=mk('defs',{}); wheel.appendChild(defsLayer);
  const cats=[]; let total=0;
  for(const c of DATA.kategorien){
    const subs=[];
    for(const s of c.unterkategorien){
      const leaves=s.aromen.filter(a=>fits(filter,a.gilt_fuer));
      if(leaves.length) subs.push({...s,aromen:leaves});
    }
    const n=subs.reduce((m,s)=>m+s.aromen.length,0);
    if(n){ cats.push({...c,unterkategorien:subs,_n:n}); total+=n; }
  }
  let a=-Math.PI/2;
  const per=(2*Math.PI - cats.length*GAP)/total;
  for(const c of cats){
    const span=c._n*per, ca0=a, ca1=a+span;
    const catSeg=mk('path',{class:'seg',d:arcPath(R0,R1,ca0,ca1),fill:c.farbe});
    setId(catSeg,c.id,'','',1,c.name,''); wheel.appendChild(catSeg);
    let sa=ca0;
    for(const s of c.unterkategorien){
      const sspan=s.aromen.length*per, sa0=sa, sa1=sa+sspan;
      const subSeg=mk('path',{class:'seg',d:arcPath(R1,R2,sa0,sa1),fill:lighten(c.farbe,.42)});
      setId(subSeg,c.id,s.id,'',2,c.name,s.name); wheel.appendChild(subSeg);
      let la=sa0;
      for(const leaf of s.aromen){
        const la0=la,la1=la+per;
        const leafSeg=mk('path',{class:'seg',d:arcPath(R2,R3,la0,la1),fill:lighten(c.farbe,.74)});
        setId(leafSeg,c.id,s.id,leaf.name,3,c.name,s.name); wheel.appendChild(leafSeg);
        const ll=leafLabel(R2,R3,(la0+la1)/2,leaf.name);
        setId(ll,c.id,s.id,leaf.name,3,c.name,s.name); wheel.appendChild(ll);
        la=la1;
      }
      const sl=bandLabel(R1,R2,sa0,sa1,s.name,'lbl-sub','600',SUB_SIZE);
      setId(sl,c.id,s.id,'',2,c.name,s.name); wheel.appendChild(sl);
      sa=sa1;
    }
    const cl=bandLabel(R0,R1,ca0,ca1,c.name.toUpperCase(),'lbl-cat','700',CAT_SIZE);
    setId(cl,c.id,'','',1,c.name,''); wheel.appendChild(cl);
    a=ca1+GAP;
  }
  wheel.appendChild(mk('circle',{id:'hub',cx:CX,cy:CY,r:R0-6,'stroke-width':2}));
  wheel.appendChild(mk('text',{x:CX,y:CY-7,class:'hubt','text-anchor':'middle','font-size':20,'font-weight':700,'pointer-events':'none'},'AROMA'));
  wheel.appendChild(mk('text',{x:CX,y:CY+16,class:'hubs','text-anchor':'middle','font-size':13,'pointer-events':'none'},
    filter==='wein'?'Wein':filter==='kaffee'?'Kaffee':'Wein & Kaffee'));
  el('count').textContent=`${cats.length} Kategorien · ${total} Aromen angezeigt`;
}
let sel=null;
function applyHighlight(){
  const all=wheel.querySelectorAll('[data-cat]');
  all.forEach(e=>{
    if(!sel){ e.classList.remove('dim'); return; }
    const cat=e.getAttribute('data-cat');
    const sub=e.getAttribute('data-sub')||'';
    const leaf=e.getAttribute('data-leaf')||'';
    const lvl=+e.getAttribute('data-level');
    let on=false;
    if(cat===sel.cat){
      if(sel.level===1) on=true;
      else if(sel.level===2) on=(lvl===1)||(sub===sel.sub);
      else { if(lvl===1) on=true; else if(sub===sel.sub) on=(lvl===2)||(leaf===sel.leaf); }
    }
    e.classList.toggle('dim',!on);
  });
}
function updateCrumb(){
  const c=el('crumb');
  if(!sel){ c.textContent=''; return; }
  let parts=[sel.cn];
  if(sel.level>=2) parts.push(sel.sn);
  if(sel.level>=3) parts.push(sel.leaf);
  c.innerHTML = parts.map(p=>`<span>${p}</span>`).join('<span class="sep">›</span>')
    + '<span class="clear" id="clr">× zurücksetzen</span>';
  el('clr').addEventListener('click',clearSel);
}
function clearSel(){ sel=null; applyHighlight(); updateCrumb(); }
function selectFromEl(e){
  const cat=e.getAttribute('data-cat'); if(!cat) return;
  const sub=e.getAttribute('data-sub')||''; const leaf=e.getAttribute('data-leaf')||'';
  const lvl=+e.getAttribute('data-level');
  const cn=e.getAttribute('data-cn')||''; const sn=e.getAttribute('data-sn')||'';
  if(sel && sel.cat===cat && (sel.sub||'')===sub && (sel.leaf||'')===leaf && sel.level===lvl){ clearSel(); return; }
  sel={cat,sub:sub||null,leaf:leaf||null,level:lvl,cn,sn};
  applyHighlight(); updateCrumb();
}
function handleTap(cx,cy){
  const t=document.elementFromPoint(cx,cy);
  if(t && t.tagName==='path' && t.classList.contains('seg')) selectFromEl(t);
  else clearSel();
}
const VB={x:0,y:0,w:1000,h:1000};
const MIN_W=160, MAX_W=1000;
function applyVB(){ wheel.setAttribute('viewBox',`${VB.x} ${VB.y} ${VB.w} ${VB.h}`); }
function clientToSvg(cx,cy){
  const r=wheel.getBoundingClientRect();
  return { x:VB.x+(cx-r.left)/r.width*VB.w, y:VB.y+(cy-r.top)/r.height*VB.h };
}
function zoomAt(cx,cy,factor){
  let nw=VB.w*factor; nw=Math.max(MIN_W,Math.min(MAX_W,nw));
  const scale=nw/VB.w; if(scale===1) return;
  const p=clientToSvg(cx,cy);
  VB.x=p.x-(p.x-VB.x)*scale; VB.y=p.y-(p.y-VB.y)*scale;
  VB.w*=scale; VB.h*=scale; clampPan(); applyVB();
}
function clampPan(){
  const m=VB.w;
  VB.x=Math.max(-m,Math.min(1000+m-VB.w,VB.x));
  VB.y=Math.max(-m,Math.min(1000+m-VB.h,VB.y));
}
function resetVB(){ VB.x=0;VB.y=0;VB.w=1000;VB.h=1000; applyVB(); }
stage.addEventListener('wheel',e=>{ e.preventDefault(); zoomAt(e.clientX,e.clientY,e.deltaY>0?1.12:0.89); },{passive:false});
const pts=new Map(); let pinchPrev=0, dragMoved=false, downX=0, downY=0;
stage.addEventListener('pointerdown',e=>{
  stage.setPointerCapture(e.pointerId);
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===1){ dragMoved=false; downX=e.clientX; downY=e.clientY; wheel.classList.add('grabbing'); }
  else dragMoved=true;
});
stage.addEventListener('pointermove',e=>{
  if(!pts.has(e.pointerId)) return;
  const prev=pts.get(e.pointerId);
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===1){
    if(Math.hypot(e.clientX-downX,e.clientY-downY)>6) dragMoved=true;
    const r=wheel.getBoundingClientRect();
    VB.x-=(e.clientX-prev.x)/r.width*VB.w;
    VB.y-=(e.clientY-prev.y)/r.height*VB.h;
    clampPan(); applyVB();
  } else if(pts.size===2){
    const a=[...pts.values()];
    const dist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
    const mx=(a[0].x+a[1].x)/2, my=(a[0].y+a[1].y)/2;
    if(pinchPrev) zoomAt(mx,my,pinchPrev/dist);
    pinchPrev=dist;
  }
});
function endPtr(e){
  const wasTap = pts.size===1 && !dragMoved;
  const cx=e.clientX, cy=e.clientY;
  pts.delete(e.pointerId);
  if(pts.size<2) pinchPrev=0;
  if(pts.size===0) wheel.classList.remove('grabbing');
  if(wasTap) handleTap(cx,cy);
}
stage.addEventListener('pointerup',endPtr);
stage.addEventListener('pointercancel',endPtr);
stage.addEventListener('dblclick',e=>{ e.preventDefault(); zoomAt(e.clientX,e.clientY,0.6); });
el('zin').addEventListener('click',()=>{ const r=wheel.getBoundingClientRect(); zoomAt(r.left+r.width/2,r.top+r.height/2,0.8); });
el('zout').addEventListener('click',()=>{ const r=wheel.getBoundingClientRect(); zoomAt(r.left+r.width/2,r.top+r.height/2,1.25); });
el('zreset').addEventListener('click',resetVB);
document.querySelectorAll('.controls button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.controls button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render(b.dataset.f);
  });
});
function setTheme(t){ document.documentElement.setAttribute('data-theme', t==='dark'?'dark':'light'); }
(function initTheme(){
  const p=new URLSearchParams(location.search).get('theme');
  if(p==='dark'||p==='light') setTheme(p);
  else if(window.matchMedia) setTheme(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
  else setTheme('light');
})();
window.addEventListener('message',e=>{
  const d=e.data;
  if(d && d.type==='aromarad-theme' && (d.value==='dark'||d.value==='light')) setTheme(d.value);
});
render('beide'); applyVB();
if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(()=>{
  render(document.querySelector('.controls button.active').dataset.f);
}); }
</script>
</body>
