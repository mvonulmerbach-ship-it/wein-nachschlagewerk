<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nachschlagewerk</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Wein">
<style>
:root{--bg:#f7f6f2;--panel:#fff;--ink:#1c1b18;--muted:#6b6862;--line:#e7e4dc;
  --brand:#3b6e58;--brandink:#fff;--soft:#eef0ee;--gold:#c79a2b;
  --shadow:0 8px 24px rgba(40,30,20,.07);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.55;-webkit-text-size-adjust:100%}
header{position:sticky;top:0;z-index:10;background:rgba(247,246,242,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hd{max-width:920px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:20px;
  background:linear-gradient(150deg,var(--brand),#0000),var(--brand);color:#fff;box-shadow:var(--shadow)}
.ttl b{font-size:17px;font-weight:800}
.ttl span{display:block;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.tabs button{font:inherit;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:1px solid transparent;border-radius:999px;padding:7px 14px;cursor:pointer}
.tabs button.active{color:var(--brandink);background:var(--brand)}
main{max-width:920px;margin:0 auto;padding:18px 16px 70px}
.view{display:none}.view.active{display:block}
.search{width:100%;font:inherit;font-size:15px;color:var(--ink);background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:12px 15px;margin-bottom:14px}
.search:focus{outline:none;border-color:var(--brand)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer}
.chip.active{color:var(--brandink);background:var(--brand);border-color:transparent}
.catblock{margin-bottom:26px}
.catblock h2{font-size:20px;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid var(--line)}
.catblock h2 .ic{margin-right:6px}
.article{background:var(--soft);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:13px;padding:14px 18px;margin-bottom:14px;font-size:14.5px;color:#33312c}
.article p{margin:0 0 9px}.article p:last-child{margin:0}.article b{color:var(--ink)}
.factlabel{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:4px 0 8px}
.entry{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.entry .q{font-weight:700;font-size:15px}
.entry .ans{margin-top:4px;font-size:14px}
.entry .ans b2{}
.entry .ans .lab{color:var(--brand);font-weight:700}
.entry .fb{margin-top:6px;font-size:14px;color:#3a3833}
.entry .fb b{color:var(--ink)}
.count{color:var(--muted);font-size:13px;margin-bottom:14px}
.src{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.src b{font-size:15px}
.src p{margin:3px 0 0;color:var(--muted);font-size:14px}
.lead{color:var(--muted);max-width:640px;margin:0 0 16px}
.iframe-wrap{border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);background:var(--panel)}
.iframe-wrap iframe{width:100%;height:78vh;border:0;display:block}
.empty{color:var(--muted);padding:30px 0;text-align:center}
footer{max-width:920px;margin:0 auto;padding:0 16px 40px;color:var(--muted);font-size:12px;text-align:center}
@media(max-width:560px){.hd{padding:10px 12px}.tabs{margin-left:0;width:100%}main{padding:14px 12px 60px}}
</style>
</head>
<body>
<header>
  <div class="hd">
    <div class="logo" id="logo"></div>
    <div class="ttl"><b id="brand"></b><span>Nachschlagewerk</span></div>
    <div class="tabs" id="tabs"></div>
  </div>
</header>
<main>
  <section class="view active" id="v-look">
    <input class="search" id="search" placeholder="Suchen … (Begriff, Antwort, Stichwort)">
    <div class="chips" id="chips"></div>
    <div class="count" id="count"></div>
    <div id="list"></div>
  </section>
  <section class="view" id="v-aroma">
    <p class="lead">Das interaktive Aromarad – klick dich durch Kategorien und Aromen.</p>
    <div class="iframe-wrap"><iframe src="aromarad.html" title="Aromarad" loading="lazy"></iframe></div>
  </section>
  <section class="view" id="v-src">
    <p class="lead">Wo findest du mehr? Empfehlenswerte, verlässliche Quellen zum Vertiefen.</p>
    <div id="srclist"></div>
  </section>
</main>
<footer id="foot"></footer>
<script>
const APP={"title": "Wein", "brand": "Vi<b>no</b>", "color": "#7a1f3d", "ic": "🍷", "aroma": true, "order": ["Wein verstehen", "Geschmack & Verkostung", "Servieren & Genießen", "Weiße Rebsorten", "Rote Rebsorten", "Regionen Deutschland", "Regionen Frankreich", "Regionen Europa", "Neue Welt", "Schaumwein", "Süßwein & Rosé", "Ikonen-Weine", "Aromarad & Verkostung"], "icons": {"Wein verstehen": "🍇", "Geschmack & Verkostung": "👅", "Servieren & Genießen": "🌡️", "Weiße Rebsorten": "🥂", "Rote Rebsorten": "🍷", "Regionen Deutschland": "🇩🇪", "Regionen Frankreich": "🇫🇷", "Regionen Europa": "🌍", "Neue Welt": "🌎", "Schaumwein": "🍾", "Süßwein & Rosé": "🍯", "Ikonen-Weine": "⭐", "Aromarad & Verkostung": "🎡"}, "entries": [{"cat": "Wein verstehen", "q": "Was passiert chemisch bei der alkoholischen Gärung?", "ans": "Zucker wird zu Alkohol und Kohlendioxid umgewandelt", "fb": "<b>Hefe</b> wandelt den Zucker des Mostes in Alkohol (Ethanol) und CO₂ um."}, {"cat": "Wein verstehen", "q": "Welcher Organismus ist für die Gärung verantwortlich?", "ans": "Hefe", "fb": "<b>Hefen</b> (meist Saccharomyces cerevisiae) vergären den Zucker zu Alkohol."}, {"cat": "Wein verstehen", "q": "Der frisch gepresste, noch unvergorene Traubensaft heißt ___.", "ans": "Most", "fb": "<b>Most</b> ist der unvergorene Saft der Trauben."}, {"cat": "Wein verstehen", "q": "Tannine stammen vor allem aus Schalen, Kernen und Stielen der Trauben.", "ans": "Wahr", "fb": "<b>Tannine</b> (Gerbstoffe) werden aus festen Bestandteilen extrahiert, daher sind Rotweine tanninreicher."}, {"cat": "Wein verstehen", "q": "Restzucker ist der Zucker, der nach der Gärung im Wein verbleibt.", "ans": "Wahr", "fb": "<b>Restzucker</b> bestimmt, ob ein Wein trocken oder süß schmeckt."}, {"cat": "Wein verstehen", "q": "Bis zu welchem Restzuckergehalt darf ein Wein in der EU als 'trocken' bezeichnet werden (Faustregel)?", "ans": "bis 9 g/l", "fb": "Bis <b>9 g/l</b> (bei entsprechender Säure) gilt ein Wein als trocken; oft genannt werden 4 g/l als Grundwert."}, {"cat": "Wein verstehen", "q": "Sortiere nach steigendem Restzucker: trocken → süß.", "ans": "trocken → halbtrocken → lieblich → süß", "fb": "Die Süßestufen steigen von <b>trocken</b> über halbtrocken und lieblich bis <b>süß</b>."}, {"cat": "Wein verstehen", "q": "Warum wird Weißwein meist ohne Schalen vergoren?", "ans": "Damit er heller und frischer bleibt, ohne Gerbstoffe", "fb": "Beim Weißwein wird der Saft von den Schalen getrennt, daher bleibt er hell und tanninarm."}, {"cat": "Wein verstehen", "q": "Bei der Rotweinbereitung gärt der Most zusammen mit den Schalen (Maischegärung).", "ans": "Wahr", "fb": "Die <b>Maischegärung</b> extrahiert Farbe und Tannine aus den Schalen."}, {"cat": "Wein verstehen", "q": "Wie entsteht klassischerweise Rosé?", "ans": "Durch kurzen Schalenkontakt roter Trauben", "fb": "Rosé entsteht durch <b>kurzen Schalenkontakt</b> roter Trauben; das Mischen ist in der EU (außer bei Rosé-Champagner) verboten."}, {"cat": "Wein verstehen", "q": "In der EU darf Stillwein-Rosé generell durch Mischen von Rot- und Weißwein hergestellt werden.", "ans": "Falsch", "fb": "Das Verschneiden ist verboten; Rosé entsteht über Schalenkontakt. Ausnahme: Rosé-Champagner."}, {"cat": "Wein verstehen", "q": "Was ist der biologische Säureabbau (malolaktische Gärung)?", "ans": "Umwandlung von Apfelsäure in mildere Milchsäure", "fb": "Beim <b>BSA</b> wandeln Bakterien scharfe Apfelsäure in weichere Milchsäure um – typisch für viele Rotweine und Chardonnay."}, {"cat": "Wein verstehen", "q": "Die Umwandlung von Apfelsäure in Milchsäure heißt ___ Gärung.", "ans": "malolaktische", "fb": "Die <b>malolaktische Gärung</b> macht den Wein weicher."}, {"cat": "Wein verstehen", "q": "Welcher Begriff gehört NICHT zu den Süßegraden eines Weins?", "ans": "spritzig", "fb": "<b>Spritzig</b> beschreibt Kohlensäure, nicht die Süße."}, {"cat": "Wein verstehen", "q": "Wodurch entsteht die Kohlensäure in einem klassischen Schaumwein?", "ans": "Durch eine zweite Gärung in der Flasche oder im Tank", "fb": "Eine <b>zweite Gärung</b> erzeugt CO₂, das im Wein gebunden bleibt."}, {"cat": "Wein verstehen", "q": "Je länger die Maischegärung beim Rotwein dauert, desto mehr Farbe und Tannin werden extrahiert.", "ans": "Wahr", "fb": "Längerer Schalenkontakt erhöht Farb- und Gerbstoffextraktion."}, {"cat": "Wein verstehen", "q": "Welche Hauptkomponenten bestimmen den Geschmack eines Weins?", "ans": "Säure, Süße, Tannin, Alkohol und Aromen", "fb": "Das Zusammenspiel von <b>Säure, Süße, Tannin, Alkohol</b> und Aromen prägt den Geschmack."}, {"cat": "Wein verstehen", "q": "Welche Faktoren beeinflussen den Tanningehalt eines Rotweins?", "ans": "Dauer des Schalenkontakts, Verwendung von Holzfässern, Rebsorte, Reifezeit", "fb": "Schalenkontakt, Holzausbau, Rebsorte und Reife beeinflussen Tannine – die Flaschenfarbe nicht."}, {"cat": "Wein verstehen", "q": "Die Gerbstoffe, die im Mund ein pelziges, trockenes Gefühl erzeugen, heißen ___.", "ans": "Tannine", "fb": "<b>Tannine</b> erzeugen die Adstringenz im Mund."}, {"cat": "Geschmack & Verkostung", "q": "Sortiere die vier klassischen Verkostungsschritte in der richtigen Reihenfolge.", "ans": "Sehen (Farbe) → Riechen (Nase) → Schmecken (Gaumen) → Bewerten (Abgang/Urteil)", "fb": "Die klassische Reihenfolge: <b>Sehen, Riechen, Schmecken, Bewerten</b>."}, {"cat": "Geschmack & Verkostung", "q": "Was beschreibt der Begriff 'Körper' eines Weins?", "ans": "Das Gewicht und die Fülle am Gaumen", "fb": "Der <b>Körper</b> beschreibt, wie schwer oder leicht ein Wein am Gaumen wirkt."}, {"cat": "Geschmack & Verkostung", "q": "Was bezeichnet der 'Abgang' eines Weins?", "ans": "Wie lange der Geschmack nach dem Schlucken anhält", "fb": "Der <b>Abgang</b> (Finish) ist die Dauer des Nachgeschmacks; ein langer Abgang gilt als Qualitätsmerkmal."}, {"cat": "Geschmack & Verkostung", "q": "Ordne die Aromakategorie ihrer Entstehung zu.", "ans": "Primäraromen ↔ aus der Rebsorte/Traube; Sekundäraromen ↔ aus Gärung und Ausbau; Tertiäraromen ↔ aus der Reifung/Alterung; Hefenote (Brioche) ↔ Sekundär, aus dem Hefelager", "fb": "<b>Primär</b> = Frucht/Sorte, <b>Sekundär</b> = Gärung/Hefe/Holz, <b>Tertiär</b> = Reife."}, {"cat": "Geschmack & Verkostung", "q": "Welches Aroma ist ein typisches Tertiäraroma (Reifearoma) bei Rotwein?", "ans": "Leder, Tabak, Trockenpflaume", "fb": "<b>Tertiäraromen</b> wie Leder und Tabak entstehen durch lange Reifung."}, {"cat": "Geschmack & Verkostung", "q": "Säure sorgt für Frische und lässt einen Wein lebendig wirken.", "ans": "Wahr", "fb": "<b>Säure</b> ist das Rückgrat eines Weins und sorgt für Spannung."}, {"cat": "Geschmack & Verkostung", "q": "Warum schwenkt man Wein im Glas vor dem Riechen?", "ans": "Um die Freisetzung der Aromen durch Sauerstoff zu fördern", "fb": "Das Schwenken vergrößert die Oberfläche und setzt <b>Aromastoffe</b> frei."}, {"cat": "Geschmack & Verkostung", "q": "Welche Eindrücke gehören zur Beurteilung am Gaumen?", "ans": "Säure, Süße, Tannin, Körper", "fb": "Am Gaumen bewertet man Säure, Süße, Tannin, Körper und Alkohol – nicht das Etikett."}, {"cat": "Geschmack & Verkostung", "q": "Welcher Begriff beschreibt KEINE Geschmackskomponente?", "ans": "Dekantieren", "fb": "<b>Dekantieren</b> ist ein Serviervorgang, keine Geschmackskomponente."}, {"cat": "Geschmack & Verkostung", "q": "Ein Wein mit viel Alkohol und Extrakt wirkt am Gaumen ___reich (Gegenteil von leicht).", "ans": "körper", "fb": "Man spricht von einem <b>körperreichen</b> Wein."}, {"cat": "Geschmack & Verkostung", "q": "Höherer Alkoholgehalt vermittelt am Gaumen oft ein wärmendes Gefühl.", "ans": "Wahr", "fb": "<b>Alkohol</b> erzeugt Wärme und trägt zum Körper bei."}, {"cat": "Geschmack & Verkostung", "q": "Welche Farbe entwickelt Rotwein typischerweise mit zunehmender Reife?", "ans": "Von Purpur/Violett zu Ziegelrot/Braun", "fb": "Reifer Rotwein verschiebt sich Richtung <b>Ziegelrot/Braun</b> am Rand."}, {"cat": "Geschmack & Verkostung", "q": "Was sind 'Kirchenfenster' oder 'Tränen' am Glasrand ein Indiz für?", "ans": "Hohen Alkohol- und/oder Zuckergehalt", "fb": "Die <b>Schlieren</b> deuten auf höheren Alkohol- bzw. Extraktgehalt hin."}, {"cat": "Servieren & Genießen", "q": "Bei welcher Temperatur serviert man Champagner idealerweise?", "ans": "ca. 7 °C (±1)", "fb": "Champagner schmeckt am besten bei <b>6–8 °C</b>."}, {"cat": "Servieren & Genießen", "q": "Ideale Serviertemperatur für einen jungen, frischen Weißwein (z.B. Riesling)?", "ans": "ca. 9 °C (±1)", "fb": "Junge Weißweine serviert man bei etwa <b>8–10 °C</b>."}, {"cat": "Servieren & Genießen", "q": "Ideale Serviertemperatur für einen kräftigen, im Holz gereiften Weißwein?", "ans": "ca. 11 °C (±1)", "fb": "Kräftige Weißweine zeigen sich bei <b>10–12 °C</b> am besten."}, {"cat": "Servieren & Genießen", "q": "Ideale Serviertemperatur für einen leichten Rotwein (z.B. Spätburgunder)?", "ans": "ca. 13 °C (±1)", "fb": "Leichte Rotweine schmecken bei <b>12–14 °C</b> am besten."}, {"cat": "Servieren & Genießen", "q": "Ideale Serviertemperatur für einen kräftigen Rotwein (z.B. Barolo, Bordeaux)?", "ans": "ca. 17 °C (±1)", "fb": "Kräftige Rotweine entfalten sich bei <b>16–18 °C</b> ('Zimmertemperatur' alter Häuser)."}, {"cat": "Servieren & Genießen", "q": "Sortiere nach steigender idealer Serviertemperatur.", "ans": "Champagner → Junger Weißwein → Leichter Rotwein → Kräftiger Rotwein", "fb": "Sprudel und Weißwein kühl, Rotwein wärmer: <b>6–8 → 8–10 → 12–14 → 16–18 °C</b>."}, {"cat": "Servieren & Genießen", "q": "Rotwein sollte grundsätzlich bei echter Zimmertemperatur (20–22 °C) serviert werden.", "ans": "Falsch", "fb": "'Zimmertemperatur' meint historisch 16–18 °C; moderne Räume sind oft zu warm."}, {"cat": "Servieren & Genießen", "q": "Wozu dient das Dekantieren eines alten Rotweins primär?", "ans": "Zum Trennen vom Bodensatz (Depot)", "fb": "Beim <b>Dekantieren</b> wird der Wein vorsichtig vom Depot getrennt; das Belüften nennt man eher Karaffieren."}, {"cat": "Servieren & Genießen", "q": "Warum karaffiert man einen jungen, kräftigen Rotwein?", "ans": "Um ihn durch Sauerstoff zu öffnen und weicher zu machen", "fb": "Junge Weine profitieren vom <b>Sauerstoffkontakt</b> (Karaffieren/Belüften)."}, {"cat": "Servieren & Genießen", "q": "Ordne Wein → passende Glasform zu.", "ans": "Champagner ↔ schmale Tulpe/Flöte; Bordeaux-Rotwein ↔ großes, hohes Glas; Burgunder/Pinot Noir ↔ bauchiges Ballonglas; Weißwein ↔ kleineres, schlankes Glas", "fb": "Die Glasform lenkt Aromen und Wein auf der Zunge gezielt."}, {"cat": "Servieren & Genießen", "q": "Welcher Weinfehler wird durch die Verbindung TCA (Trichloranisol) verursacht?", "ans": "Korkschmecker (Korkton)", "fb": "<b>TCA</b> verursacht den muffigen 'Korkton', der nach feuchtem Karton riecht."}, {"cat": "Servieren & Genießen", "q": "Ein Wein, der nach feuchtem Karton/Keller muffelt, hat einen ___-Fehler (TCA).", "ans": "Kork", "fb": "Der <b>Korkton</b> entsteht durch TCA im Naturkorken."}, {"cat": "Servieren & Genießen", "q": "Wie äußert sich ein oxidierter Weißwein typischerweise?", "ans": "Bräunliche Farbe, Noten von Sherry/Apfel/Nuss, müde Frucht", "fb": "<b>Oxidation</b> bräunt den Wein und bringt firne, sherryartige Noten."}, {"cat": "Servieren & Genießen", "q": "Ein Schraubverschluss kann keinen Korkton (TCA) verursachen.", "ans": "Wahr", "fb": "Da kein Naturkorken verwendet wird, ist ein klassischer Korkschmecker ausgeschlossen."}, {"cat": "Servieren & Genießen", "q": "Welche Weinfaustregel zur Speisenkombination ist verbreitet?", "ans": "Süßer Wein zu salzigem/würzigem Essen", "fb": "Süße balanciert Schärfe und Salz – z.B. Riesling zu asiatischer Küche."}, {"cat": "Servieren & Genießen", "q": "Welche Aussagen zur Wein-Speisen-Kombination sind sinnvoll?", "ans": "Kräftiges Gericht → kräftiger Wein, Säurebetonte Speisen → säurebetonter Wein, Fettiges Essen → Wein mit Säure oder Tannin", "fb": "Gewicht und Säure sollten harmonieren; zu Süßem passt eher ein Süßwein, zu Scharfem ein fruchtig-süßer Weißwein."}, {"cat": "Servieren & Genießen", "q": "Welcher Begriff bezeichnet KEINEN Weinfehler?", "ans": "Dekantieren", "fb": "<b>Dekantieren</b> ist ein Servierschritt, kein Fehler."}, {"cat": "Servieren & Genießen", "q": "Was ist ein 'Böckser' im Wein?", "ans": "Ein unangenehmer Schwefel-/Reduktionston (faule Eier, Streichholz)", "fb": "Der <b>Böckser</b> ist ein Reduktionsfehler mit Schwefelnoten; oft hilft Belüften."}, {"cat": "Servieren & Genießen", "q": "Schaumweine werden in der Regel kühler serviert als Rotweine.", "ans": "Wahr", "fb": "Sprudel: 6–8 °C, kräftiger Rotwein: 16–18 °C."}, {"cat": "Servieren & Genießen", "q": "Warum füllt man ein Weinglas nur etwa zu einem Drittel?", "ans": "Damit genug Platz zum Schwenken und für die Aromaentfaltung bleibt", "fb": "Platz im Glas erlaubt das <b>Schwenken</b> und sammelt die Aromen."}, {"cat": "Servieren & Genießen", "q": "Ein Süßwein wie Sauternes wird oft bei welcher Temperatur serviert?", "ans": "ca. 9 °C (±2)", "fb": "Edelsüße Weine serviert man kühl, etwa <b>8–10 °C</b>."}, {"cat": "Servieren & Genießen", "q": "Das Trennen eines alten Rotweins vom Bodensatz nennt man ___.", "ans": "Dekantieren", "fb": "Beim <b>Dekantieren</b> bleibt das Depot in der Flasche."}, {"cat": "Wein verstehen", "q": "Welches Gas entsteht neben Alkohol bei der Gärung?", "ans": "Kohlendioxid (CO₂)", "fb": "Hefe produziert Alkohol und <b>CO₂</b>."}, {"cat": "Wein verstehen", "q": "Was bezeichnet man als 'Maische'?", "ans": "Das Gemisch aus zerquetschten Trauben, Saft und Schalen", "fb": "Die <b>Maische</b> ist die gemahlene Traubenmasse vor/während der Gärung."}, {"cat": "Wein verstehen", "q": "Aus 1 kg Traubenzucker entstehen grob etwa 0,6 % vol Alkohol pro 1° Oechsle-Bereich – mehr Zucker im Most bedeutet potenziell mehr Alkohol.", "ans": "Wahr", "fb": "Mehr Mostgewicht (Oechsle) = mehr vergärbarer Zucker = potenziell mehr Alkohol."}, {"cat": "Wein verstehen", "q": "Das Mostgewicht (Zuckergehalt des Mostes) wird in Deutschland in Grad ___ gemessen.", "ans": "Oechsle", "fb": "Grad <b>Oechsle</b> gibt die Dichte/Zuckerkonzentration des Mostes an."}, {"cat": "Geschmack & Verkostung", "q": "Ein höherer Säuregehalt lässt einen Wein meist frischer und 'spitzer' wirken.", "ans": "Wahr", "fb": "Säure erhöht die Frische und das Speichelgefühl."}, {"cat": "Servieren & Genießen", "q": "Wofür ist ein Schraubverschluss besonders praktisch?", "ans": "Frische, früh zu trinkende Weine und Schutz vor Korkton", "fb": "Schraubverschlüsse bewahren Frische und vermeiden Korkfehler."}, {"cat": "Servieren & Genießen", "q": "Ein leichter, gekühlter Rosé wird oft bei welcher Temperatur serviert?", "ans": "ca. 11 °C (±2)", "fb": "Rosé serviert man kühl bei etwa <b>10–12 °C</b>."}, {"cat": "Wein verstehen", "q": "Welcher Begriff gehört NICHT zum Thema Gärung?", "ans": "Karaffe", "fb": "Die <b>Karaffe</b> ist ein Servierhilfsmittel."}, {"cat": "Geschmack & Verkostung", "q": "Ordne Geschmackseindruck → Beschreibung zu.", "ans": "Säure ↔ frisch, mundwässernd; Tannin ↔ pelzig, adstringierend; Süße ↔ Restzucker, rund; Alkohol ↔ wärmend, Körper gebend", "fb": "Die Grundbausteine im Mund: Säure, Tannin, Süße, Alkohol."}, {"cat": "Wein verstehen", "q": "Weißwein kann auch aus roten Trauben hergestellt werden, wenn man den Saft sofort von den Schalen trennt.", "ans": "Wahr", "fb": "Beispiel: Blanc de Noirs – Weißwein aus roten Trauben."}, {"cat": "Wein verstehen", "q": "Weißwein aus roten Trauben (ohne Schalenfarbe) heißt 'Blanc de ___'.", "ans": "Noirs", "fb": "<b>Blanc de Noirs</b> = weiß aus schwarzen/roten Trauben."}, {"cat": "Geschmack & Verkostung", "q": "Welcher Aromatyp ist ein klassisches Sekundäraroma?", "ans": "Brioche/Hefe (aus dem Hefelager)", "fb": "<b>Hefenoten</b> wie Brioche entstehen bei Gärung/Hefelager."}, {"cat": "Servieren & Genießen", "q": "Ein zu kalt servierter Rotwein wirkt oft härter und tanninbetonter.", "ans": "Wahr", "fb": "Kälte verstärkt Tannin und Säure und dämpft die Frucht."}, {"cat": "Servieren & Genießen", "q": "Welche Glasform passt typischerweise zu Pinot Noir / Burgunder?", "ans": "Bauchiges, weites Ballonglas", "fb": "Das <b>Burgunderglas</b> ist bauchig und betont feine Aromen."}, {"cat": "Wein verstehen", "q": "Welche dieser Süßegrade gibt es offiziell bei Stillwein?", "ans": "trocken, halbtrocken, lieblich, süß", "fb": "Die offiziellen Stufen: trocken, halbtrocken, lieblich, süß. 'Prickelnd' beschreibt Kohlensäure."}, {"cat": "Weiße Rebsorten", "q": "Welche weiße Rebsorte gilt als die deutsche Königsrebe?", "ans": "Riesling", "fb": "<b>Riesling</b> ist Deutschlands wichtigste und renommierteste weiße Rebsorte."}, {"cat": "Weiße Rebsorten", "q": "Welches Aroma ist typisch für reifen Riesling?", "ans": "Petrol/Mineralität und Steinobst", "fb": "Reifer Riesling zeigt oft <b>Petrolnoten</b> und Aromen von Apfel, Pfirsich, Zitrus."}, {"cat": "Weiße Rebsorten", "q": "Welche Aromen sind charakteristisch für Sauvignon Blanc?", "ans": "Stachelbeere, Cassisblatt, grüne Paprika", "fb": "<b>Sauvignon Blanc</b> ist grün-würzig: Stachelbeere, Cassis, grüne Paprika."}, {"cat": "Weiße Rebsorten", "q": "Ordne weiße Rebsorte → typische Herkunft zu.", "ans": "Grüner Veltliner ↔ Österreich; Chenin Blanc ↔ Loire / Südafrika; Riesling ↔ Deutschland; Chardonnay ↔ Burgund (Frankreich)", "fb": "Diese Sorten sind eng mit ihren Heimatregionen verbunden."}, {"cat": "Weiße Rebsorten", "q": "Welche Rebsorte ist KEINE weiße Sorte?", "ans": "Merlot", "fb": "<b>Merlot</b> ist eine rote Rebsorte."}, {"cat": "Weiße Rebsorten", "q": "Welche Rebsorte heißt in Frankreich Pinot Gris und in Italien Pinot Grigio?", "ans": "Grauburgunder", "fb": "<b>Grauburgunder</b> = Pinot Gris = Pinot Grigio."}, {"cat": "Weiße Rebsorten", "q": "Weißburgunder heißt auf Französisch Pinot ___.", "ans": "Blanc", "fb": "<b>Weißburgunder = Pinot Blanc</b>."}, {"cat": "Weiße Rebsorten", "q": "Welche aromatische weiße Rebsorte ist berühmt für Lychee- und Rosenduft?", "ans": "Gewürztraminer", "fb": "<b>Gewürztraminer</b> betört mit Lychee, Rosen und Gewürzen."}, {"cat": "Weiße Rebsorten", "q": "Welche Rebsorte ist im Elsass und an der nördlichen Rhône (Condrieu) für üppige Aprikosennoten bekannt?", "ans": "Viognier", "fb": "<b>Viognier</b> liefert füllige Weine mit Aprikose und Blüten, Heimat Condrieu."}, {"cat": "Weiße Rebsorten", "q": "Welche Rebsorte prägt Chablis und die weißen Burgunder?", "ans": "Chardonnay", "fb": "<b>Chardonnay</b> ist die weiße Burgunderrebe (Chablis, Meursault, Montrachet)."}, {"cat": "Weiße Rebsorten", "q": "Grüner Veltliner ist die wichtigste weiße Rebsorte Österreichs.", "ans": "Wahr", "fb": "<b>Grüner Veltliner</b> mit pfeffrig-würziger Note dominiert Österreichs Weißweine."}, {"cat": "Weiße Rebsorten", "q": "Welche Rebsorte ist extrem wandlungsfähig (trocken bis edelsüß, auch Schaumwein) und Heimat an der Loire (Vouvray)?", "ans": "Chenin Blanc", "fb": "<b>Chenin Blanc</b> reicht von knochentrocken bis edelsüß; Vouvray ist berühmt."}, {"cat": "Weiße Rebsorten", "q": "Welche Rebsorte ist in Franken weit verbreitet und gilt als eher neutral-erdig mit dezenter Frucht?", "ans": "Silvaner", "fb": "<b>Silvaner</b> ist Frankens klassische Sorte – erdig, oft im Bocksbeutel."}, {"cat": "Weiße Rebsorten", "q": "Muskateller ist eine aromatische Rebsorte mit intensivem Traubenduft.", "ans": "Wahr", "fb": "<b>Muskateller</b> riecht typisch nach frischen Weintrauben und Blüten."}, {"cat": "Weiße Rebsorten", "q": "Welche der folgenden sind weiße Burgundersorten?", "ans": "Weißburgunder (Pinot Blanc), Grauburgunder (Pinot Gris), Chardonnay", "fb": "Pinot Blanc, Pinot Gris und Chardonnay gehören zur weißen Burgunderfamilie."}, {"cat": "Weiße Rebsorten", "q": "Ordne weiße Rebsorte → typisches Aroma zu.", "ans": "Sauvignon Blanc ↔ Stachelbeere/grüne Paprika; Gewürztraminer ↔ Lychee/Rose; Riesling ↔ Pfirsich/Petrol; Viognier ↔ Aprikose", "fb": "Charakteraromen helfen beim Blindverkosten."}, {"cat": "Weiße Rebsorten", "q": "Welche Sorte gehört NICHT zur Burgunder-Familie?", "ans": "Sauvignon Blanc", "fb": "<b>Sauvignon Blanc</b> ist keine Burgundersorte."}, {"cat": "Weiße Rebsorten", "q": "Die berühmte trockene Weißweinregion mit reinem Chardonnay im nördlichen Burgund heißt ___.", "ans": "Chablis", "fb": "<b>Chablis</b> steht für mineralischen, kühlen Chardonnay."}, {"cat": "Weiße Rebsorten", "q": "Welche Rebsorte wird wegen ihres pfeffrigen Tons als typisch österreichisch beschrieben?", "ans": "Grüner Veltliner", "fb": "Der 'Pfefferl'-Ton ist Markenzeichen des <b>Grünen Veltliners</b>."}, {"cat": "Weiße Rebsorten", "q": "Woher stammt die Rebsorte Riesling ursprünglich?", "ans": "Deutschland (Rheintal)", "fb": "<b>Riesling</b> hat seinen Ursprung im deutschen Rheintal."}, {"cat": "Rote Rebsorten", "q": "Wie heißt Spätburgunder auf Französisch?", "ans": "Pinot Noir", "fb": "<b>Spätburgunder = Pinot Noir</b>."}, {"cat": "Rote Rebsorten", "q": "Welche Rebsorte ist die Hauptsorte im Barolo und Barbaresco (Piemont)?", "ans": "Nebbiolo", "fb": "<b>Nebbiolo</b> ergibt tanninreiche, langlebige Weine wie Barolo."}, {"cat": "Rote Rebsorten", "q": "Welche Rebsorte dominiert den Chianti?", "ans": "Sangiovese", "fb": "<b>Sangiovese</b> ist die Hauptrebe der Toskana und des Chianti."}, {"cat": "Rote Rebsorten", "q": "Welche Aromen sind typisch für Cabernet Sauvignon?", "ans": "Schwarze Johannisbeere, Zedernholz, grüne Paprika", "fb": "<b>Cabernet Sauvignon</b>: Cassis, Zeder, oft grüne Paprika und feste Tannine."}, {"cat": "Rote Rebsorten", "q": "Welche Rebsorte heißt in Australien Shiraz?", "ans": "Syrah", "fb": "<b>Syrah = Shiraz</b>; in Australien eine Leitsorte (Barossa)."}, {"cat": "Rote Rebsorten", "q": "Die spanische Leitrebe der Rioja heißt ___.", "ans": "Tempranillo", "fb": "<b>Tempranillo</b> prägt Rioja und Ribera del Duero."}, {"cat": "Rote Rebsorten", "q": "Welche Rebsorte ist KEINE rote Sorte?", "ans": "Chardonnay", "fb": "<b>Chardonnay</b> ist weiß."}, {"cat": "Rote Rebsorten", "q": "Welche rote Rebsorte gilt als weicher, fruchtiger Partner des Cabernet Sauvignon im Bordeaux?", "ans": "Merlot", "fb": "<b>Merlot</b> ist samtig und früh zugänglich, oft mit Cabernet verschnitten."}, {"cat": "Rote Rebsorten", "q": "Ordne rote Rebsorte → typische Region zu.", "ans": "Nebbiolo ↔ Piemont (Italien); Tempranillo ↔ Rioja (Spanien); Malbec ↔ Mendoza (Argentinien); Zweigelt ↔ Österreich", "fb": "Jede Sorte hat ein klassisches Anbaugebiet."}, {"cat": "Rote Rebsorten", "q": "Welche Rebsorte ist die meistangebaute rote Sorte Österreichs?", "ans": "Zweigelt", "fb": "<b>Zweigelt</b> (Kreuzung aus Blaufränkisch und St. Laurent) ist Österreichs häufigste Rotweinsorte."}, {"cat": "Rote Rebsorten", "q": "Welche rote Rebsorte ist die Spezialität von Mendoza (Argentinien)?", "ans": "Malbec", "fb": "<b>Malbec</b> ist Argentiniens Aushängeschild, ursprünglich aus Cahors."}, {"cat": "Rote Rebsorten", "q": "Welche Rebsorte ist Basis der kräftigen Südrhône-Cuvées (Châteauneuf-du-Pape) und liefert Erdbeer-/Würznoten?", "ans": "Grenache", "fb": "<b>Grenache</b> ist Hauptbestandteil vieler Südrhône-Weine."}, {"cat": "Rote Rebsorten", "q": "Pinot Noir gilt als dünnhäutige, anspruchsvolle und kühleklimaliebende Rebsorte.", "ans": "Wahr", "fb": "<b>Pinot Noir</b> ist heikel im Anbau und liebt kühlere Lagen."}, {"cat": "Rote Rebsorten", "q": "Welche österreichische Rotweinsorte ist für würzige, kirschige und säurebetonte Weine bekannt (Mittelburgenland)?", "ans": "Blaufränkisch", "fb": "<b>Blaufränkisch</b> liefert würzige, langlebige Rotweine."}, {"cat": "Rote Rebsorten", "q": "Welche dieser Rebsorten werden klassisch im Bordeaux-Blend verwendet?", "ans": "Cabernet Sauvignon, Merlot, Cabernet Franc, Petit Verdot", "fb": "Bordeaux-Cuvées bestehen aus Cabernet Sauvignon, Merlot, Cabernet Franc, Petit Verdot und Malbec – nicht Sangiovese."}, {"cat": "Rote Rebsorten", "q": "Welche Aromen sind typisch für reifen Syrah/Shiraz?", "ans": "Schwarzer Pfeffer, dunkle Beeren, Speck/Räuchernote", "fb": "<b>Syrah</b> zeigt Pfeffer, dunkle Frucht und würzig-rauchige Noten."}, {"cat": "Rote Rebsorten", "q": "Die toskanische Hauptrebe für Chianti und Brunello heißt ___.", "ans": "Sangiovese", "fb": "<b>Sangiovese</b> (im Brunello 'Sangiovese Grosso')."}, {"cat": "Rote Rebsorten", "q": "Welche Sorte stammt NICHT aus Frankreich?", "ans": "Tempranillo", "fb": "<b>Tempranillo</b> ist spanisch."}, {"cat": "Rote Rebsorten", "q": "Welche Aromen sind typisch für Pinot Noir / Spätburgunder?", "ans": "Rote Beeren (Kirsche, Himbeere), erdige/pilzige Noten", "fb": "<b>Pinot Noir</b> ist filigran: rote Frucht, Erde, Unterholz."}, {"cat": "Regionen Deutschland", "q": "Welche deutsche Region ist weltberühmt für steile Schieferlagen und filigrane Rieslinge?", "ans": "Mosel", "fb": "Die <b>Mosel</b> mit ihren Steilhängen und Schiefer prägt finessenreiche Rieslinge."}, {"cat": "Regionen Deutschland", "q": "Sortiere die deutschen Prädikatsstufen nach steigendem Mostgewicht.", "ans": "Kabinett → Spätlese → Auslese → Beerenauslese → Trockenbeerenauslese", "fb": "Steigendes Mostgewicht: Kabinett → Spätlese → Auslese → BA → TBA (Eiswein dazwischen)."}, {"cat": "Regionen Deutschland", "q": "Wofür steht die Abkürzung 'GG' beim VDP?", "ans": "Großes Gewächs", "fb": "<b>Großes Gewächs (GG)</b> ist die trockene Spitzenkategorie aus VDP-Großen Lagen."}, {"cat": "Regionen Deutschland", "q": "Der Adlerlogo-Verband deutscher Spitzenweingüter heißt ___ (Abkürzung).", "ans": "VDP", "fb": "Der <b>VDP</b> klassifiziert Lagen mit dem Traubenadler."}, {"cat": "Regionen Deutschland", "q": "Welche Region gilt als wärmstes und sonnenreichstes deutsches Anbaugebiet, gut für Rotwein und Burgundersorten?", "ans": "Baden", "fb": "<b>Baden</b> liegt in der wärmsten Weinbauzone Deutschlands."}, {"cat": "Regionen Deutschland", "q": "Ordne deutsche Region → Besonderheit zu.", "ans": "Mosel ↔ Schiefer, steile Riesling-Lagen; Franken ↔ Silvaner im Bocksbeutel; Pfalz ↔ wärmeres Klima, kräftige Weine; Rheingau ↔ Riesling am Rhein, Schloss Johannisberg", "fb": "Jede Region hat ein Markenzeichen."}, {"cat": "Regionen Deutschland", "q": "Was unterscheidet eine Beerenauslese (BA) von einer Trockenbeerenauslese (TBA)?", "ans": "TBA wird aus eingetrockneten, edelfaulen Beeren mit höherem Mostgewicht gelesen", "fb": "<b>TBA</b> nutzt rosinierte, botrytisbefallene Beeren – höchste Süße und Konzentration."}, {"cat": "Regionen Deutschland", "q": "Ein Kabinett hat in der Regel ein niedrigeres Mostgewicht als eine Spätlese.", "ans": "Wahr", "fb": "<b>Kabinett</b> ist die leichteste Prädikatsstufe."}, {"cat": "Regionen Deutschland", "q": "Wie entsteht Eiswein?", "ans": "Aus bei mind. -7 °C gefroren geernteten und gepressten Trauben", "fb": "<b>Eiswein</b>: gefrorene Trauben werden gepresst, das Wasser bleibt als Eis zurück – hochkonzentrierter Saft."}, {"cat": "Regionen Deutschland", "q": "Welche ist KEINE deutsche Prädikatsstufe?", "ans": "Crianza", "fb": "<b>Crianza</b> ist eine spanische Reifestufe."}, {"cat": "Regionen Deutschland", "q": "Die fränkische Spezialflasche mit bauchiger Form heißt ___.", "ans": "Bocksbeutel", "fb": "Der <b>Bocksbeutel</b> ist typisch für Frankenwein."}, {"cat": "Regionen Deutschland", "q": "Welche Rebsorte ist in der Pfalz und im Rheingau führend?", "ans": "Riesling", "fb": "<b>Riesling</b> ist Leitsorte in Pfalz und Rheingau."}, {"cat": "Regionen Deutschland", "q": "Welche Prädikatsstufen sind typischerweise edelsüß/dessertwein-tauglich?", "ans": "Beerenauslese, Trockenbeerenauslese, Eiswein", "fb": "BA, TBA und Eiswein sind die klassischen Edelsüßen; Auslese kann süß oder trocken sein."}, {"cat": "Regionen Deutschland", "q": "Die Mosel ist für ihre steilen Weinberge bekannt.", "ans": "Wahr", "fb": "Die <b>Mosel</b> hat einige der steilsten Weinberge der Welt (z.B. Calmont)."}, {"cat": "Regionen Deutschland", "q": "Was bedeutet 'Erste Lage' bzw. 'Große Lage' in der VDP-Klassifikation?", "ans": "Eine Lagen-Hierarchie ähnlich Premier/Grand Cru", "fb": "Der <b>VDP</b> klassifiziert Lagen vierstufig: Gutswein, Ortswein, Erste Lage, Große Lage."}, {"cat": "Regionen Deutschland", "q": "Ab welcher Mindesttemperatur (Minusgrade) müssen Trauben für Eiswein gelesen werden?", "ans": "ca. -7 °C (±1)", "fb": "Trauben müssen bei mindestens <b>-7 °C</b> gefroren gelesen werden."}, {"cat": "Regionen Deutschland", "q": "Welche dieser Regionen liegt am Rhein gegenüber bekannter Steillagen und ist für eleganten Riesling berühmt?", "ans": "Rheingau", "fb": "Der <b>Rheingau</b> ist eine Wiege des deutschen Spitzenrieslings."}, {"cat": "Regionen Frankreich", "q": "Welche Region ist die Heimat des Champagners?", "ans": "Champagne", "fb": "Echter <b>Champagner</b> stammt ausschließlich aus der Champagne."}, {"cat": "Regionen Frankreich", "q": "Welche Rebsorte dominiert am 'linken Ufer' von Bordeaux (Médoc)?", "ans": "Cabernet Sauvignon", "fb": "Am <b>linken Ufer</b> (Médoc, Graves) führt Cabernet Sauvignon."}, {"cat": "Regionen Frankreich", "q": "Welche Rebsorte dominiert am 'rechten Ufer' von Bordeaux (Saint-Émilion, Pomerol)?", "ans": "Merlot", "fb": "Am <b>rechten Ufer</b> dominiert Merlot (z.B. Pétrus)."}, {"cat": "Regionen Frankreich", "q": "Ordne französische Region → Hauptrebsorte zu.", "ans": "Burgund (rot) ↔ Pinot Noir; Burgund (weiß) ↔ Chardonnay; Nördliche Rhône ↔ Syrah; Sancerre (Loire) ↔ Sauvignon Blanc", "fb": "Frankreichs Regionen sind oft sortenrein definiert."}, {"cat": "Regionen Frankreich", "q": "Das französische Herkunftssystem für kontrollierte Anbaugebiete heißt ___ (Abkürzung).", "ans": "AOC", "fb": "<b>AOC</b> (Appellation d'Origine Contrôlée), heute oft AOP."}, {"cat": "Regionen Frankreich", "q": "Welche Region liegt NICHT in Frankreich?", "ans": "Rioja", "fb": "<b>Rioja</b> liegt in Spanien."}, {"cat": "Regionen Frankreich", "q": "Welche drei Hauptrebsorten sind in der Champagne zugelassen (klassisch)?", "ans": "Chardonnay, Pinot Noir, Pinot Meunier", "fb": "Champagner: <b>Chardonnay, Pinot Noir und Pinot Meunier</b>."}, {"cat": "Regionen Frankreich", "q": "Welche Rebsorte ist im Elsass besonders charakteristisch und wird sortenrein etikettiert?", "ans": "Riesling und Gewürztraminer", "fb": "Das <b>Elsass</b> setzt auf sortenreine Weißweine (Riesling, Gewürztraminer, Pinot Gris)."}, {"cat": "Regionen Frankreich", "q": "Was bezeichnet 'Grand Cru' im Burgund?", "ans": "Die höchste Lagen-Klassifikation", "fb": "<b>Grand Cru</b> ist die Spitzenklasse der burgundischen Lagen, über Premier Cru."}, {"cat": "Regionen Frankreich", "q": "Sancerre und Pouilly-Fumé an der Loire stehen für Sauvignon Blanc.", "ans": "Wahr", "fb": "Beide Loire-Appellationen sind klassische <b>Sauvignon-Blanc</b>-Regionen."}, {"cat": "Regionen Frankreich", "q": "Sortiere die burgundische Lagenhierarchie von einfach zu hochwertig.", "ans": "Bourgogne (regional) → Village → Premier Cru → Grand Cru", "fb": "Burgund-Pyramide: regional → Village → Premier Cru → <b>Grand Cru</b>."}, {"cat": "Regionen Frankreich", "q": "Welche Rebsorte ist in Châteauneuf-du-Pape (Südrhône) am wichtigsten?", "ans": "Grenache", "fb": "<b>Grenache</b> ist Leitsorte der Südrhône, oft im GSM-Blend."}, {"cat": "Regionen Frankreich", "q": "Welche Appellation der nördlichen Rhône ist für reinsortigen Viognier berühmt?", "ans": "Condrieu", "fb": "<b>Condrieu</b> steht für aromatischen Viognier."}, {"cat": "Regionen Frankreich", "q": "Das nördlichste Weißweingebiet Burgunds mit mineralischem Chardonnay heißt ___.", "ans": "Chablis", "fb": "<b>Chablis</b> – kühl, mineralisch, reiner Chardonnay."}, {"cat": "Regionen Frankreich", "q": "Welche Regionen liegen in Frankreich?", "ans": "Burgund, Rhône, Loire, Champagne", "fb": "Die <b>Toskana</b> liegt in Italien."}, {"cat": "Regionen Europa", "q": "Aus welcher italienischen Region stammt Barolo?", "ans": "Piemont", "fb": "<b>Barolo</b> aus Nebbiolo kommt aus dem Piemont."}, {"cat": "Regionen Europa", "q": "Welche Traube und Region stecken hinter Brunello di Montalcino?", "ans": "Sangiovese, Toskana", "fb": "<b>Brunello</b> ist 100 % Sangiovese aus der Toskana."}, {"cat": "Regionen Europa", "q": "Wie wird Amarone della Valpolicella hergestellt?", "ans": "Aus angetrockneten (rosinierten) Trauben", "fb": "<b>Amarone</b> entsteht aus an der Luft getrockneten Trauben (Appassimento) – kräftig und alkoholreich."}, {"cat": "Regionen Europa", "q": "Die höchste italienische Herkunftsstufe heißt ___ (Abkürzung).", "ans": "DOCG", "fb": "<b>DOCG</b> (Denominazione di Origine Controllata e Garantita) ist die Spitze."}, {"cat": "Regionen Europa", "q": "Sortiere die spanischen Reifestufen nach steigender Reifedauer.", "ans": "Joven → Crianza → Reserva → Gran Reserva", "fb": "Steigende Reife: Joven (jung) → Crianza → Reserva → <b>Gran Reserva</b>."}, {"cat": "Regionen Europa", "q": "Ordne Wein → Land/Region zu.", "ans": "Barolo ↔ Piemont, Italien; Rioja ↔ Spanien; Port ↔ Douro, Portugal; Grüner Veltliner ↔ Österreich", "fb": "Europas Klassiker und ihre Heimat."}, {"cat": "Regionen Europa", "q": "Welche zwei Regionen sind Spaniens berühmteste Tempranillo-Gebiete?", "ans": "Rioja und Ribera del Duero", "fb": "<b>Rioja</b> und <b>Ribera del Duero</b> sind die Tempranillo-Hochburgen."}, {"cat": "Regionen Europa", "q": "Welcher Wein stammt NICHT aus Italien?", "ans": "Rioja", "fb": "<b>Rioja</b> kommt aus Spanien."}, {"cat": "Regionen Europa", "q": "Was bedeutet die spanische Stufe 'Gran Reserva' bei Rotwein grob?", "ans": "Mehrere Jahre Fass- und Flaschenreife (oft min. 5 Jahre)", "fb": "<b>Gran Reserva</b> verlangt lange Reife (typisch min. 5 Jahre, davon ≥18 Monate im Fass bei Rioja)."}, {"cat": "Regionen Europa", "q": "Port (Portwein) ist ein aufgespriteter (verstärkter) Süßwein aus dem Douro-Tal.", "ans": "Wahr", "fb": "<b>Port</b> wird mit Weinbrand aufgespritet, wodurch Restsüße und höherer Alkohol bleiben."}, {"cat": "Regionen Europa", "q": "Welcher italienische Weißwein-/Schaumweinklassiker ist KEIN Rotwein?", "ans": "Soave", "fb": "<b>Soave</b> ist ein Weißwein (Garganega) aus Venetien."}, {"cat": "Regionen Europa", "q": "Der portugiesische verstärkte Süßwein aus dem Douro heißt ___.", "ans": "Port", "fb": "<b>Port</b> reift häufig in Vila Nova de Gaia."}, {"cat": "Regionen Europa", "q": "Welche Weine zählen zu den großen italienischen DOCG-Rotweinen?", "ans": "Barolo, Brunello di Montalcino, Chianti Classico, Barbaresco", "fb": "Soave ist weiß; die übrigen sind klassische DOCG-Rotweine."}, {"cat": "Regionen Europa", "q": "Aus welcher Region stammt der österreichische Süßwein-Klassiker (Edelfäule) rund um den Neusiedlersee?", "ans": "Burgenland", "fb": "Das <b>Burgenland</b> (Neusiedlersee) ist berühmt für edelsüße Weine."}, {"cat": "Regionen Europa", "q": "Welche Rebsorten prägen klassischen Rioja (rot)?", "ans": "Tempranillo, ergänzt durch Garnacha/Graciano/Mazuelo", "fb": "<b>Rioja</b> basiert auf Tempranillo, oft verschnitten."}, {"cat": "Regionen Europa", "q": "In welchem Jahr wurde das DOC-System Italiens grob eingeführt (Jahrzehnt genügt)?", "ans": "ca. 1965 Jahr (±5)", "fb": "Das italienische <b>DOC</b>-System startete in den 1960er-Jahren (1963/1966)."}, {"cat": "Neue Welt", "q": "Welche US-Region ist das berühmteste Premium-Weingebiet (Cabernet Sauvignon)?", "ans": "Napa Valley", "fb": "<b>Napa Valley</b> (Kalifornien) ist für hochwertigen Cabernet Sauvignon weltberühmt."}, {"cat": "Neue Welt", "q": "Welche Region Neuseelands ist für Sauvignon Blanc weltbekannt?", "ans": "Marlborough", "fb": "<b>Marlborough</b> machte neuseeländischen Sauvignon Blanc berühmt."}, {"cat": "Neue Welt", "q": "Welche australische Region ist für kräftigen Shiraz berühmt?", "ans": "Barossa Valley", "fb": "<b>Barossa Valley</b> steht für vollmundigen Shiraz."}, {"cat": "Neue Welt", "q": "Ordne Land → typische Vorzeige-Rebsorte zu.", "ans": "Argentinien ↔ Malbec; Neuseeland ↔ Sauvignon Blanc; Australien (Barossa) ↔ Shiraz; Südafrika ↔ Pinotage", "fb": "Jedes Neue-Welt-Land hat eine Signatursorte."}, {"cat": "Neue Welt", "q": "Welche Rebsorte ist eine südafrikanische Kreuzung aus Pinot Noir und Cinsault?", "ans": "Pinotage", "fb": "<b>Pinotage</b> ist Südafrikas eigene Kreuzung."}, {"cat": "Neue Welt", "q": "Welche Rebsorte wurde in Chile lange mit Merlot verwechselt und ist heute Chiles Signatursorte?", "ans": "Carmenère", "fb": "<b>Carmenère</b> wurde in Chile wiederentdeckt."}, {"cat": "Neue Welt", "q": "Argentiniens wichtigste Rotweinregion am Fuße der Anden heißt ___.", "ans": "Mendoza", "fb": "<b>Mendoza</b> ist Heimat des argentinischen Malbec."}, {"cat": "Neue Welt", "q": "Kalifornischer Zinfandel ist genetisch mit dem italienischen Primitivo verwandt.", "ans": "Wahr", "fb": "<b>Zinfandel</b> und <b>Primitivo</b> sind dieselbe Rebsorte (Crljenak Kaštelanski)."}, {"cat": "Neue Welt", "q": "Welches Land gehört NICHT zur 'Neuen Welt' des Weins?", "ans": "Frankreich", "fb": "<b>Frankreich</b> gehört zur 'Alten Welt'."}, {"cat": "Neue Welt", "q": "Welche neuseeländische Region ist für hochwertigen Pinot Noir bekannt?", "ans": "Central Otago", "fb": "<b>Central Otago</b> ist Neuseelands Pinot-Noir-Hochburg."}, {"cat": "Neue Welt", "q": "Welche Signatur-Kombinationen aus Land und Sorte stimmen?", "ans": "Argentinien – Malbec, Neuseeland – Sauvignon Blanc, Chile – Carmenère, Südafrika – Pinotage", "fb": "Australiens Signatur ist Shiraz, nicht Nebbiolo."}, {"cat": "Neue Welt", "q": "Welche südafrikanische Region ist ein bekanntes Premium-Anbaugebiet bei Kapstadt?", "ans": "Stellenbosch", "fb": "<b>Stellenbosch</b> ist Südafrikas renommierte Weinregion."}, {"cat": "Neue Welt", "q": "Wie hoch ist der Alkoholgehalt eines kräftigen Barossa-Shiraz oft (typischer Wert)?", "ans": "ca. 14.5 % vol (±1)", "fb": "Kräftige warme Rotweine erreichen oft <b>14–15 % vol</b>."}, {"cat": "Schaumwein", "q": "Wie heißt die klassische Champagner-Methode mit zweiter Gärung in der Flasche?", "ans": "Méthode traditionnelle (Flaschengärung)", "fb": "Die <b>Méthode traditionnelle</b> (Flaschengärung) ist Pflicht für Champagner."}, {"cat": "Schaumwein", "q": "Wie wird Prosecco üblicherweise hergestellt?", "ans": "Tankgärung (Charmat/Martinotti)", "fb": "<b>Prosecco</b> entsteht meist im Tank (Charmat-Methode)."}, {"cat": "Schaumwein", "q": "Wie heißt der deutsche Schaumwein?", "ans": "Sekt", "fb": "<b>Sekt</b> ist die deutsche Bezeichnung für Qualitätsschaumwein."}, {"cat": "Schaumwein", "q": "Der spanische Schaumwein nach traditioneller Flaschengärung heißt ___.", "ans": "Cava", "fb": "<b>Cava</b> wird wie Champagner flaschenvergoren, v.a. in Katalonien."}, {"cat": "Schaumwein", "q": "Ordne Schaumwein → Herkunftsland zu.", "ans": "Champagner ↔ Frankreich; Cava ↔ Spanien; Prosecco ↔ Italien; Sekt ↔ Deutschland", "fb": "Jeder Schaumwein hat seine Herkunft."}, {"cat": "Schaumwein", "q": "Sortiere die Dosage-Stufen von trocken nach süßer.", "ans": "Brut Nature / Zéro → Extra Brut → Brut → Extra Dry → Sec", "fb": "Steigender Zucker: Brut Nature → Extra Brut → Brut → Extra Dry → Sec → Demi-Sec → Doux."}, {"cat": "Schaumwein", "q": "Was ist die 'Dosage' beim Schaumwein?", "ans": "Die Zugabe von Likör (Zucker/Wein) nach dem Degorgieren", "fb": "Die <b>Dosage</b> (Versanddosage) bestimmt die finale Süße."}, {"cat": "Schaumwein", "q": "Crémant ist französischer Schaumwein aus traditioneller Flaschengärung außerhalb der Champagne.", "ans": "Wahr", "fb": "<b>Crémant</b> (z.B. d'Alsace, de Bourgogne) nutzt die klassische Methode."}, {"cat": "Schaumwein", "q": "Welcher ist KEIN Schaumwein?", "ans": "Sancerre", "fb": "<b>Sancerre</b> ist ein Stillwein aus der Loire."}, {"cat": "Schaumwein", "q": "Wofür steht 'Blanc de Blancs' beim Champagner?", "ans": "Aus ausschließlich weißen Trauben (Chardonnay)", "fb": "<b>Blanc de Blancs</b> = nur weiße Trauben (Chardonnay)."}, {"cat": "Schaumwein", "q": "Das Entfernen des Hefedepots aus der Schaumweinflasche heißt ___.", "ans": "Degorgieren", "fb": "Beim <b>Degorgieren</b> wird der gefrorene Hefepfropfen entfernt."}, {"cat": "Schaumwein", "q": "Welche Dosage-Stufe ist am trockensten?", "ans": "Brut Nature", "fb": "<b>Brut Nature</b> (Zéro) enthält praktisch keinen zugesetzten Zucker."}, {"cat": "Schaumwein", "q": "Welche Aussagen über Champagner sind richtig?", "ans": "Zweite Gärung in der Flasche, Zugelassen: Chardonnay, Pinot Noir, Pinot Meunier, Dosage bestimmt die Süße, Stammt aus der Champagne", "fb": "Champagner wird flaschenvergoren, nicht im Tank."}, {"cat": "Schaumwein", "q": "Wie viel Restzucker (g/l) hat 'Brut'-Champagner maximal?", "ans": "ca. 12 g/l (±1)", "fb": "<b>Brut</b> darf bis zu 12 g/l Restzucker enthalten."}, {"cat": "Süßwein & Rosé", "q": "Was ist die Grundlage des berühmten Süßweins Sauternes?", "ans": "Edelfäule (Botrytis cinerea)", "fb": "<b>Sauternes</b> beruht auf der Edelfäule, die Trauben rosiniert und konzentriert."}, {"cat": "Süßwein & Rosé", "q": "Der Pilz, der edelsüße Weine ermöglicht, heißt Botrytis ___.", "ans": "cinerea", "fb": "<b>Botrytis cinerea</b> = Edelfäule (Grauschimmel im guten Sinne)."}, {"cat": "Süßwein & Rosé", "q": "Welche Rebsorten prägen Sauternes (Bordeaux)?", "ans": "Sémillon und Sauvignon Blanc", "fb": "<b>Sémillon</b> (anfällig für Botrytis) und Sauvignon Blanc bilden Sauternes."}, {"cat": "Süßwein & Rosé", "q": "Welcher spanische Wein ist ein oxidativ ausgebauter, aufgespriteter Wein aus Andalusien?", "ans": "Sherry", "fb": "<b>Sherry</b> (Jerez) wird oft oxidativ und im Solera-System ausgebaut."}, {"cat": "Süßwein & Rosé", "q": "Eiswein und edelfaule Beerenauslese sind beides natürliche Konzentrationsmethoden ohne Zuckerzusatz.", "ans": "Wahr", "fb": "Eiswein konzentriert durch Frost, Botrytis durch Eintrocknen – beides ohne Süßung."}, {"cat": "Süßwein & Rosé", "q": "Ordne Süßwein → Konzentrationsprinzip zu.", "ans": "Sauternes ↔ Edelfäule/Botrytis; Eiswein ↔ Gefrieren am Stock; Amarone ↔ Trocknen der Trauben; Port ↔ Aufspritung", "fb": "Verschiedene Wege zur Süße und Konzentration."}, {"cat": "Süßwein & Rosé", "q": "Welcher ist KEIN Süßwein bzw. Dessertwein?", "ans": "Sancerre", "fb": "<b>Sancerre</b> ist trockener Sauvignon Blanc."}, {"cat": "Süßwein & Rosé", "q": "Was bedeutet der Sherry-Stil 'Fino'?", "ans": "Trocken, hell, unter Florhefe ausgebaut", "fb": "<b>Fino</b> reift unter der schützenden Florhefe, bleibt trocken und blass."}, {"cat": "Süßwein & Rosé", "q": "Der ungarische edelsüße Botrytis-Wein heißt ___ (Aszú).", "ans": "Tokajer", "fb": "<b>Tokaji Aszú</b> ist Ungarns berühmter Süßwein."}, {"cat": "Süßwein & Rosé", "q": "Wie entsteht Rosé klassischerweise (Wiederholung im Regionenkontext)?", "ans": "Kurzer Schalenkontakt roter Trauben (Saignée/Direktpressung)", "fb": "Rosé entsteht über kurzen <b>Schalenkontakt</b>, z.B. Saignée-Verfahren."}, {"cat": "Süßwein & Rosé", "q": "Welche dieser Weine sind aufgespritete (verstärkte) Weine?", "ans": "Port, Sherry, Madeira", "fb": "Port, Sherry und Madeira werden verstärkt; Sauternes und Eiswein nicht."}, {"cat": "Süßwein & Rosé", "q": "Welche französische Region ist für trockenen, blassen Rosé besonders berühmt?", "ans": "Provence", "fb": "Die <b>Provence</b> ist Synonym für hellen, trockenen Rosé."}, {"cat": "Süßwein & Rosé", "q": "Wie hoch ist der Alkoholgehalt von klassischem Port grob?", "ans": "ca. 20 % vol (±1.5)", "fb": "<b>Port</b> liegt durch Aufspritung meist bei rund 19–22 % vol."}, {"cat": "Ikonen-Weine", "q": "Aus welchem Land/Region stammt der Kultwein Sassicaia?", "ans": "Bolgheri, Toskana (Italien)", "fb": "<b>Sassicaia</b> ist ein 'Supertuscan' aus Bolgheri auf Cabernet-Basis."}, {"cat": "Ikonen-Weine", "q": "Tignanello gilt als Pionier welcher Weinkategorie?", "ans": "Supertuscan", "fb": "<b>Tignanello</b> (Antinori) prägte die Supertuscan-Bewegung (Sangiovese mit Cabernet)."}, {"cat": "Ikonen-Weine", "q": "Dom Pérignon ist ein berühmter Prestige-...?", "ans": "Champagner", "fb": "<b>Dom Pérignon</b> ist die Prestige-Cuvée von Moët & Chandon (Champagner)."}, {"cat": "Ikonen-Weine", "q": "Cloudy Bay machte welche Kombination weltberühmt?", "ans": "Marlborough Sauvignon Blanc (Neuseeland)", "fb": "<b>Cloudy Bay</b> prägte den Ruf des Marlborough Sauvignon Blanc."}, {"cat": "Ikonen-Weine", "q": "Pétrus ist ein legendärer Wein aus welcher Appellation – und welcher Sorte?", "ans": "Pomerol, überwiegend Merlot", "fb": "<b>Pétrus</b> aus Pomerol ist ein nahezu reinsortiger Merlot von Weltrang."}, {"cat": "Ikonen-Weine", "q": "Ordne Ikonen-Wein → Herkunft/Typ zu.", "ans": "Sassicaia ↔ Bolgheri, Supertuscan; Dom Pérignon ↔ Champagner; Pétrus ↔ Pomerol, Merlot; Cloudy Bay ↔ Marlborough Sauvignon Blanc", "fb": "Berühmte Weine und ihre Heimat."}, {"cat": "Ikonen-Weine", "q": "Welcher Wein ist KEIN Bordeaux-Gewächs?", "ans": "Sassicaia", "fb": "<b>Sassicaia</b> ist italienisch (Toskana)."}, {"cat": "Ikonen-Weine", "q": "Die 'Supertuscans' entstanden, weil renommierte Erzeuger außerhalb der starren DOC-Regeln experimentieren wollten.", "ans": "Wahr", "fb": "<b>Supertuscans</b> begannen oft als IGT, da sie Cabernet & Co. einsetzten."}, {"cat": "Ikonen-Weine", "q": "Die Kategorie toskanischer Kultweine mit (teils) Bordeaux-Sorten heißt ___.", "ans": "Supertuscan", "fb": "<b>Supertuscans</b> wie Sassicaia, Tignanello, Ornellaia."}, {"cat": "Ikonen-Weine", "q": "Welche dieser Weine sind italienische Ikonen?", "ans": "Sassicaia, Tignanello, Ornellaia", "fb": "Pétrus (Frankreich) und Dom Pérignon (Champagner) sind keine italienischen Weine."}, {"cat": "Ikonen-Weine", "q": "Welches deutsche Weingut/Lage gilt als ikonische Riesling-Adresse an der Mosel?", "ans": "Egon Müller / Scharzhofberg", "fb": "<b>Egon Müller</b> (Scharzhofberg) ist eine Riesling-Legende."}, {"cat": "Aromarad & Verkostung", "q": "Wer entwickelte das berühmte Weinaromarad (Wine Aroma Wheel)?", "ans": "Ann C. Noble", "fb": "<b>Ann C. Noble</b> entwickelte das Aromarad 1984 an der UC Davis."}, {"cat": "Aromarad & Verkostung", "q": "In welchem Jahr wurde das Weinaromarad von Ann C. Noble vorgestellt?", "ans": "ca. 1984 Jahr (±1)", "fb": "Das <b>Aromarad</b> stammt von <b>1984</b> (UC Davis)."}, {"cat": "Aromarad & Verkostung", "q": "Das Weinaromarad wurde an der Universität ___ (Kalifornien) entwickelt.", "ans": "UC Davis", "fb": "<b>UC Davis</b> ist die Heimat des Aromarads."}, {"cat": "Aromarad & Verkostung", "q": "Welche Aromakategorie umfasst Düfte wie Rose, Veilchen und Akazie?", "ans": "blumig", "fb": "Rose und Veilchen gehören zur <b>blumigen</b> Aromakategorie."}, {"cat": "Aromarad & Verkostung", "q": "Ordne Aroma → Kategorie zu.", "ans": "Zitrone ↔ fruchtig (Zitrus); Veilchen ↔ blumig; Pfeffer ↔ würzig; Vanille ↔ holzig/würzig (Eiche)", "fb": "Das Aromarad gliedert Düfte in Hauptkategorien."}, {"cat": "Aromarad & Verkostung", "q": "Welche Aromakategorie passt NICHT zu den anderen (alles Fruchtaromen)?", "ans": "Leder", "fb": "<b>Leder</b> ist ein erdig/animalisches Reifearoma, kein Fruchtaroma."}, {"cat": "Aromarad & Verkostung", "q": "Welches Aroma deutet auf einen 'grünen', unreifen oder kühl gewachsenen Wein hin?", "ans": "Grüne Paprika / frisch geschnittenes Gras", "fb": "<b>Vegetabile</b> Noten wie grüne Paprika weisen auf kühles Klima oder Unreife hin."}, {"cat": "Aromarad & Verkostung", "q": "Welches Aroma stammt typischerweise vom Ausbau im neuen Eichenholzfass?", "ans": "Vanille, Toast, Kokos", "fb": "<b>Vanille, Toast und Kokos</b> kommen vom (neuen) Holzfass."}, {"cat": "Aromarad & Verkostung", "q": "Welche der folgenden sind Hauptaromakategorien im Aromarad?", "ans": "fruchtig, blumig, würzig, erdig", "fb": "'Numerisch' ist keine Aromakategorie; fruchtig, blumig, würzig und erdig schon."}, {"cat": "Aromarad & Verkostung", "q": "Welches charakteristische Aroma verbindet man mit gereiftem Riesling?", "ans": "Petrol/Kerosin", "fb": "Der <b>Petrolton</b> (TDN) ist ein Reifemarker des Rieslings."}, {"cat": "Aromarad & Verkostung", "q": "Ordne Rebsorte → typisches Leitaroma zu.", "ans": "Gewürztraminer ↔ Lychee; Sauvignon Blanc ↔ Stachelbeere; Syrah ↔ schwarzer Pfeffer; Cabernet Sauvignon ↔ Cassis", "fb": "Leitaromen helfen beim Erkennen der Sorte."}, {"cat": "Aromarad & Verkostung", "q": "Vanillearomen im Wein stammen häufig vom Ausbau im Eichenfass.", "ans": "Wahr", "fb": "<b>Eichenholz</b> gibt Vanille (Vanillin) ab."}, {"cat": "Aromarad & Verkostung", "q": "Welches Fehlaroma erinnert an 'feuchten Karton/Keller' und stammt von TCA?", "ans": "Korkton", "fb": "<b>Korkton</b> riecht muffig nach feuchtem Karton."}, {"cat": "Aromarad & Verkostung", "q": "Welches Fehlaroma erinnert an faule Eier oder Streichholz und ist ein Reduktionston?", "ans": "Böckser", "fb": "Der <b>Böckser</b> ist ein Schwefel-/Reduktionsfehler."}, {"cat": "Aromarad & Verkostung", "q": "Welcher Fehlton (Brettanomyces) erinnert an Pferdestall/Pflaster/Leder im negativen Sinn?", "ans": "Brett", "fb": "<b>Brett</b> (Brettanomyces) bringt animalische, ställerige Noten."}, {"cat": "Aromarad & Verkostung", "q": "Welcher Begriff ist KEIN Weinfehlaroma?", "ans": "Cassis", "fb": "<b>Cassis</b> ist ein erwünschtes Fruchtaroma (z.B. Cabernet)."}, {"cat": "Aromarad & Verkostung", "q": "Aromen, die direkt aus der Traube/Rebsorte stammen, nennt man ___aromen.", "ans": "Primär", "fb": "<b>Primäraromen</b> kommen aus der Frucht/Rebsorte."}, {"cat": "Aromarad & Verkostung", "q": "Sortiere vom Inneren zum Äußeren des Aromarads: allgemein → konkret.", "ans": "Hauptkategorie (z.B. fruchtig) → Unterkategorie (z.B. Zitrusfrucht) → konkretes Aroma (z.B. Zitrone)", "fb": "Das Aromarad geht von <b>allgemein</b> (innen) zu <b>konkret</b> (außen)."}, {"cat": "Aromarad & Verkostung", "q": "Welches Aroma ist ein klassisches Leitaroma von Cabernet Sauvignon?", "ans": "Schwarze Johannisbeere (Cassis)", "fb": "<b>Cassis</b> ist ein Markenzeichen des Cabernet Sauvignon."}, {"cat": "Aromarad & Verkostung", "q": "Welche Aromen deuten auf Holzfassausbau hin?", "ans": "Vanille, Toast/Röstaromen, Kokos, Rauch/Zedernholz", "fb": "Stachelbeere kommt von der Rebsorte (Sauvignon), nicht vom Holz."}, {"cat": "Aromarad & Verkostung", "q": "Welche Aromakategorie umfasst Pilz, Waldboden und Trüffel?", "ans": "erdig", "fb": "Pilz und Waldboden gehören zur <b>erdigen</b> Kategorie (oft Reifearomen)."}, {"cat": "Aromarad & Verkostung", "q": "Welches Aroma ist typisch 'vegetabil' und ein Hinweis auf Pyrazine?", "ans": "Grüne Paprika/Spargel", "fb": "<b>Pyrazine</b> erzeugen grün-vegetabile Noten (grüne Paprika), z.B. bei Sauvignon/Cabernet aus kühlem Klima."}, {"cat": "Aromarad & Verkostung", "q": "Das Aromarad hilft Verkostern, Düfte präziser zu benennen.", "ans": "Wahr", "fb": "Das <b>Aromarad</b> liefert ein gemeinsames Vokabular für Aromen."}, {"cat": "Aromarad & Verkostung", "q": "Aromen, die durch Reifung/Alterung entstehen (z.B. Leder, Trüffel), nennt man ___aromen.", "ans": "Tertiär", "fb": "<b>Tertiäraromen</b> entstehen mit der Reife."}, {"cat": "Aromarad & Verkostung", "q": "Welches Aroma erkennt man typischerweise bei Gewürztraminer im Aromarad (blumig)?", "ans": "Rose", "fb": "<b>Rose</b> (und Lychee) sind Leitaromen des Gewürztraminers."}, {"cat": "Aromarad & Verkostung", "q": "Welches Aroma gehört NICHT in die Kategorie 'würzig'?", "ans": "Zitrone", "fb": "<b>Zitrone</b> ist fruchtig (Zitrus), nicht würzig."}, {"cat": "Geschmack & Verkostung", "q": "Sortiere Rotweinfarbe nach steigendem Alter (jung zu alt).", "ans": "Purpurrot/Violett → Rubinrot → Granatrot → Ziegelrot/Braun", "fb": "Mit der Reife verschiebt sich Rotwein von violett zu <b>ziegelrot/braun</b>."}, {"cat": "Servieren & Genießen", "q": "Sortiere nach steigender Serviertemperatur.", "ans": "Eiswein/Süßwein → Trockener Weißwein → Rosé → Kräftiger Rotwein", "fb": "Süß und weiß kühl, Rotwein am wärmsten."}, {"cat": "Regionen Europa", "q": "Sortiere italienische Herkunftsstufen von einfach zu hochwertig.", "ans": "Vino (Tafelwein) → IGT → DOC → DOCG", "fb": "Italiens Pyramide: Vino, IGT, DOC, <b>DOCG</b>."}, {"cat": "Regionen Frankreich", "q": "Sortiere französische Qualitätsstufen von einfach zu hochwertig.", "ans": "Vin de France → IGP (Vin de Pays) → AOP/AOC", "fb": "Frankreich: Vin de France, IGP, <b>AOP/AOC</b>."}, {"cat": "Regionen Deutschland", "q": "Sortiere die VDP-Stufen von einfach zu hochwertig.", "ans": "Gutswein → Ortswein → Erste Lage → Große Lage", "fb": "VDP: Gutswein, Ortswein, Erste Lage, <b>Große Lage</b>."}, {"cat": "Süßwein & Rosé", "q": "Sortiere nach steigendem typischen Restzucker.", "ans": "Trockener Riesling → Spätlese (fruchtig) → Auslese → Trockenbeerenauslese", "fb": "Steigende Süße bis zur <b>TBA</b>."}, {"cat": "Neue Welt", "q": "Sortiere diese Weine nach steigendem typischem Körper/Alkohol.", "ans": "Marlborough Sauvignon Blanc → Kalifornischer Chardonnay → Barossa Shiraz", "fb": "Frischer Weißwein leichter, kräftiger Shiraz am wuchtigsten."}, {"cat": "Aromarad & Verkostung", "q": "Sortiere die Aromaanalyse: erster Eindruck zu Detail.", "ans": "Erster Geruchseindruck → Hauptaromakategorie bestimmen → Konkretes Einzelaroma benennen", "fb": "Vom groben Eindruck zum <b>konkreten Aroma</b>."}, {"cat": "Weiße Rebsorten", "q": "Ordne Synonym-Paare zu.", "ans": "Grauburgunder ↔ Pinot Grigio; Weißburgunder ↔ Pinot Blanc; Spätburgunder ↔ Pinot Noir; Müller-Thurgau ↔ Rivaner", "fb": "Rebsorten tragen je nach Land verschiedene Namen."}, {"cat": "Rote Rebsorten", "q": "Ordne rote Rebsorte zu Leitaroma.", "ans": "Cabernet Sauvignon ↔ Cassis/Zeder; Pinot Noir ↔ Kirsche/Walderde; Syrah ↔ Pfeffer/dunkle Beere; Grenache ↔ Erdbeere/Würze", "fb": "Leitaromen erleichtern das Blindverkosten."}, {"cat": "Regionen Frankreich", "q": "Ordne Appellation zu Rebsorte.", "ans": "Chablis ↔ Chardonnay; Sancerre ↔ Sauvignon Blanc; Côte-Rôtie ↔ Syrah; Condrieu ↔ Viognier", "fb": "Französische Appellationen sind oft sortentypisch."}, {"cat": "Schaumwein", "q": "Ordne Schaumwein zu Herstellungsmethode.", "ans": "Champagner ↔ Flaschengärung; Prosecco ↔ Tankgärung (Charmat); Cava ↔ Flaschengärung; Crémant ↔ Flaschengärung", "fb": "Champagner, Cava und Crémant gären in der Flasche, Prosecco im Tank."}, {"cat": "Regionen Europa", "q": "Ordne Region zu Land.", "ans": "Piemont ↔ Italien; Rioja ↔ Spanien; Douro ↔ Portugal; Wachau ↔ Österreich", "fb": "Europäische Spitzenregionen und ihre Länder."}, {"cat": "Aromarad & Verkostung", "q": "Ordne Aroma zu Aromakategorie.", "ans": "Waldboden ↔ erdig; Akazie ↔ blumig; Nelke ↔ würzig; Brombeere ↔ fruchtig", "fb": "Aromen lassen sich Hauptkategorien zuordnen."}, {"cat": "Servieren & Genießen", "q": "Ordne Weinfehler zu Ursache.", "ans": "Korkton ↔ TCA aus dem Korken; Oxidation ↔ zu viel Sauerstoff; Böckser ↔ Reduktion/Schwefel; Essigstich ↔ Essigsäurebakterien", "fb": "Jeder Fehler hat eine typische Ursache."}, {"cat": "Weiße Rebsorten", "q": "Welche dieser Rebsorten sind weiß?", "ans": "Riesling, Chenin Blanc, Viognier", "fb": "Tempranillo und Nebbiolo sind rote Sorten."}, {"cat": "Rote Rebsorten", "q": "Welche dieser Rebsorten sind rot?", "ans": "Merlot, Syrah, Sangiovese", "fb": "Grüner Veltliner und Gewürztraminer sind weiß."}, {"cat": "Regionen Deutschland", "q": "Welche gehören zu den deutschen Anbaugebieten?", "ans": "Mosel, Rheingau, Pfalz, Franken", "fb": "Die Toskana liegt in Italien; die übrigen sind deutsche Anbaugebiete."}, {"cat": "Regionen Europa", "q": "Welche Weine kommen aus Spanien?", "ans": "Rioja, Ribera del Duero, Cava, Sherry", "fb": "Barolo ist italienisch; die übrigen sind spanisch."}, {"cat": "Schaumwein", "q": "Welche Schaumweine entstehen durch Flaschengärung?", "ans": "Champagner, Cava, Crémant, Sekt nach traditioneller Methode", "fb": "Prosecco wird typisch im Tank vergoren."}, {"cat": "Geschmack & Verkostung", "q": "Welche Schritte gehören zur klassischen Weinverkostung?", "ans": "Sehen, Riechen, Schmecken, Bewerten", "fb": "Sehen, Riechen, Schmecken und Bewerten gehören dazu."}, {"cat": "Servieren & Genießen", "q": "Welche Maßnahmen können einen Wein öffnen?", "ans": "Karaffieren, Schwenken im Glas, Etwas wärmer servieren", "fb": "Belüften, Schwenken und richtige Temperatur helfen."}, {"cat": "Aromarad & Verkostung", "q": "Welche dieser Begriffe sind Weinfehlaromen?", "ans": "Korkton, Böckser, Essigstich, Brett", "fb": "Cassis ist ein erwünschtes Fruchtaroma."}, {"cat": "Neue Welt", "q": "Welche Regionen liegen in der Neuen Welt?", "ans": "Napa Valley, Marlborough, Mendoza, Barossa Valley", "fb": "Burgund gehört zur Alten Welt."}, {"cat": "Süßwein & Rosé", "q": "Welche Weine sind typischerweise süß bzw. edelsüß?", "ans": "Sauternes, Tokaji Aszú, Eiswein, Beerenauslese", "fb": "Sancerre ist trocken."}, {"cat": "Weiße Rebsorten", "q": "Chardonnay wird mit und ohne Holz ausgebaut.", "ans": "Wahr", "fb": "<b>Chardonnay</b> reicht von mineralisch bis cremig-holzbetont."}, {"cat": "Rote Rebsorten", "q": "Merlot reift in der Regel früher und ist weicher als Cabernet Sauvignon.", "ans": "Wahr", "fb": "<b>Merlot</b> ist samtiger und früher zugänglich."}, {"cat": "Regionen Frankreich", "q": "Echter Champagner darf nur aus der Region Champagne stammen.", "ans": "Wahr", "fb": "<b>Champagner</b> ist eine geschützte Herkunftsbezeichnung."}, {"cat": "Regionen Europa", "q": "Chianti Classico erkennt man am schwarzen Hahn (Gallo Nero).", "ans": "Wahr", "fb": "Der <b>Gallo Nero</b> ist das Siegel des Chianti Classico."}, {"cat": "Schaumwein", "q": "Prosecco wird üblicherweise im Drucktank vergoren.", "ans": "Wahr", "fb": "<b>Prosecco</b> nutzt die Charmat-/Tankmethode."}, {"cat": "Neue Welt", "q": "Napa Valley liegt in Kalifornien.", "ans": "Wahr", "fb": "<b>Napa Valley</b> ist eine kalifornische Premiumregion."}, {"cat": "Süßwein & Rosé", "q": "Sherry stammt aus Andalusien (Jerez) in Spanien.", "ans": "Wahr", "fb": "<b>Sherry</b> kommt aus der Region um Jerez."}, {"cat": "Ikonen-Weine", "q": "Dom Pérignon ist nach einem Benediktinermönch benannt.", "ans": "Wahr", "fb": "<b>Dom Pérignon</b> war Kellermeister und namensgebend."}, {"cat": "Aromarad & Verkostung", "q": "Pyrazine sind für grün-vegetabile Aromen wie grüne Paprika verantwortlich.", "ans": "Wahr", "fb": "<b>Pyrazine</b> erzeugen die grünen Noten."}, {"cat": "Regionen Deutschland", "q": "Müller-Thurgau (Rivaner) ist eine Kreuzung und in Deutschland weit verbreitet.", "ans": "Wahr", "fb": "<b>Müller-Thurgau</b> ist eine frühe, ertragreiche Kreuzung."}, {"cat": "Rote Rebsorten", "q": "Nebbiolo ergibt die Weine Barolo und ___.", "ans": "Barbaresco", "fb": "<b>Barbaresco</b> ist der elegantere Nebbiolo-Klassiker."}, {"cat": "Regionen Europa", "q": "Der toskanische Wein mit dem schwarzen Hahn heißt Chianti ___.", "ans": "Classico", "fb": "<b>Chianti Classico</b> trägt den Gallo Nero."}, {"cat": "Wein verstehen", "q": "Alkoholgehalt eines typischen trockenen deutschen Rieslings ungefähr?", "ans": "ca. 12 % vol (±1.5)", "fb": "Trockener Riesling liegt oft bei <b>11-13 % vol</b>."}, {"cat": "Weiße Rebsorten", "q": "Welche dieser Rebsorten ist KEINE typische Elsass-Sorte?", "ans": "Sangiovese", "fb": "<b>Sangiovese</b> ist eine toskanische Rotweinsorte und keine Elsass-Sorte."}, {"cat": "Rote Rebsorten", "q": "Welche Rebsorte gehört zur klassischen GSM-Cuvée der Rhône NICHT dazu?", "ans": "Cabernet Sauvignon", "fb": "<b>GSM</b> steht für Grenache, Syrah, Mourvèdre - Cabernet gehört nicht dazu."}, {"cat": "Regionen Deutschland", "q": "Welche Stufe ist die leichteste der deutschen Prädikate?", "ans": "Kabinett", "fb": "<b>Kabinett</b> hat das niedrigste Mindestmostgewicht."}, {"cat": "Regionen Europa", "q": "Welcher dieser Weine ist ein Weißwein?", "ans": "Soave", "fb": "<b>Soave</b> (Garganega) ist ein venetischer Weißwein."}, {"cat": "Servieren & Genießen", "q": "Welcher dieser Begriffe ist ein Weinfehler?", "ans": "Korkton", "fb": "<b>Korkton</b> (TCA) ist ein Fehler; die anderen sind Servierschritte."}, {"cat": "Aromarad & Verkostung", "q": "Welches Aroma gehört zur Kategorie fruchtig?", "ans": "Brombeere", "fb": "<b>Brombeere</b> ist ein Fruchtaroma; die anderen sind blumig, würzig, erdig oder holzig."}], "sources": [["Das Weinlexikon – Jens Priewe", "Verständliches Standardwerk auf Deutsch."], ["The Oxford Companion to Wine – Jancis Robinson", "Das wissenschaftliche Referenzwerk schlechthin (englisch)."], ["Wine Folly", "winefolly.com – Grafiken zu Rebsorten und Regionen, einsteigerfreundlich."], ["Deutsches Weininstitut", "deutscheweine.de – deutsche Anbaugebiete, Qualitätsstufen, Weinrecht."], ["Decanter", "decanter.com – Verkostungen, Regionen, Hintergründe."]], "articles": {"Wein verstehen": "<p><b>Wein</b> entsteht durch die <b>alkoholische Gärung</b> von Traubensaft: Hefen wandeln den Zucker des <b>Mosts</b> in Alkohol (Ethanol) und Kohlendioxid um. Der Zucker, der nicht vergoren wird, bleibt als <b>Restzucker</b> erhalten und bestimmt den Süßegrad – als <i>trocken</i> gilt in der EU faustregelartig ein Wein bis etwa 9 g/l Restzucker.</p>\n<p>Der zentrale Unterschied zwischen Rot- und Weißwein liegt nicht in der Traubenfarbe allein, sondern in der Verarbeitung: Rotwein vergärt auf der <b>Maische</b> (mitsamt Schalen), wodurch Farbstoffe und <b>Tannine</b> (Gerbstoffe aus Schalen, Kernen und Stielen) in den Wein gelangen. Weißwein wird meist ohne Schalenkontakt gekeltert. Der <b>Ausbau</b> erfolgt im neutralen Edelstahl (frisch, fruchtig) oder im <b>Barrique</b> (Eichenfass, gibt Vanille- und Röstnoten sowie Struktur).</p>", "Geschmack & Verkostung": "<p>Wein wird über vier Grundkomponenten beurteilt: <b>Säure</b>, <b>Tannin</b>, <b>Süße</b> und <b>Alkohol</b>, die im Idealfall ausbalanciert sind und zusammen den <b>Körper</b> ergeben. Aromen teilt man in <b>Primäraromen</b> (aus der Rebsorte), <b>Sekundäraromen</b> (aus Gärung/Ausbau) und <b>Tertiäraromen</b> (aus der Reifung) ein.</p>\n<p>Eine systematische Verkostung folgt dem Dreischritt <b>Sehen – Riechen – Schmecken</b>: Farbe und Viskosität, dann das Bukett, schließlich Geschmack, Struktur und <b>Abgang</b> (wie lange der Eindruck nachklingt). Geübtes Verkosten schult vor allem die Nase – der Großteil des „Geschmacks\" ist Geruch.</p>", "Servieren & Genießen": "<p>Temperatur und Glas prägen den Eindruck stark. Faustregel: Weißweine 8–12 °C, Rotweine 14–18 °C; je gehaltvoller, desto wärmer. Junge tanninreiche Rotweine profitieren vom <b>Dekantieren</b> (Belüftung), alte Weine eher vom vorsichtigen <b>Karaffieren</b> (Trennen vom Depot).</p>\n<p>Bei <b>Speisenkombinationen</b> gilt: Das Gericht und der Wein sollten sich in Intensität, Säure und Süße ergänzen – Säure passt zu Fettigem, Süßwein zu Blauschimmelkäse oder Dessert. Korken vs. Schraubverschluss sagt nichts über Qualität aus; der Schraubverschluss schützt sogar zuverlässiger vor Kork-Fehltönen.</p>", "Weiße Rebsorten": "<p>Zu den wichtigsten weißen Rebsorten zählen <b>Riesling</b> (kühles Klima, hohe Säure, lagerfähig, von trocken bis edelsüß), <b>Chardonnay</b> (wandlungsfähig, oft im Barrique, weltweit verbreitet), <b>Sauvignon Blanc</b> (grasig-fruchtig, knackige Säure), <b>Grauburgunder/Pinot Gris</b> und <b>Weißburgunder/Pinot Blanc</b>.</p>\n<p>Der Charakter einer Sorte hängt stark vom Klima ab: dieselbe Rebe ergibt in kühler Lage säurebetonte, schlanke Weine, in warmer Lage vollere, fruchtigere. Riesling gilt als die deutsche Vorzeigesorte und als eine der wenigen, die ihr Anbaugebiet (das <b>Terroir</b>) besonders deutlich abbildet.</p>", "Rote Rebsorten": "<p>Bedeutende rote Sorten sind <b>Cabernet Sauvignon</b> (tanninreich, lagerfähig, Cassis), <b>Merlot</b> (weicher, fruchtig), <b>Pinot Noir/Spätburgunder</b> (hell, elegant, anspruchsvoll im Anbau), <b>Syrah/Shiraz</b>, <b>Tempranillo</b> (Spanien) und <b>Sangiovese</b> (Italien, Chianti).</p>\n<p>Der Tanningehalt hängt von Rebsorte, Dauer des Schalenkontakts, Holzausbau und Reife ab. Viele große Rotweine sind <b>Cuvées</b> (Verschnitte mehrerer Sorten), etwa die klassische Bordeaux-Mischung aus Cabernet Sauvignon, Merlot und Cabernet Franc.</p>", "Regionen Deutschland": "<p>Deutschland hat 13 Anbaugebiete, geprägt von kühlem Klima und steilen Flusslagen. Wichtige Regionen sind <b>Mosel</b> (Riesling von Schieferböden, filigran), <b>Rheingau</b> und <b>Pfalz</b> (kräftigere Rieslinge), <b>Baden</b> (wärmer, Burgundersorten) und <b>Franken</b> (Silvaner, Bocksbeutel).</p>\n<p>Das deutsche Qualitätssystem unterscheidet u. a. <b>Prädikatswein</b> mit Stufen nach Mostgewicht: Kabinett, Spätlese, Auslese, Beerenauslese, Trockenbeerenauslese und Eiswein. Der <b>VDP</b> (Verband Deutscher Prädikatsweingüter) nutzt zusätzlich eine Lagenklassifikation bis hin zum <b>Großen Gewächs</b> (GG) für trockene Spitzenweine.</p>", "Regionen Frankreich": "<p>Frankreich gilt als Mutterland vieler Stile. <b>Bordeaux</b> (Cuvées aus Cabernet/Merlot), <b>Burgund/Bourgogne</b> (reinsortig Pinot Noir und Chardonnay, kleinteilige Lagen), <b>Champagne</b> (Schaumwein), <b>Rhône</b> (Syrah, Grenache) und das <b>Loire</b>-Tal sind die bekanntesten Regionen.</p>\n<p>Frankreich prägte das Konzept der <b>Appellation (AOC/AOP)</b>: Herkunft, erlaubte Rebsorten und Anbauregeln sind gesetzlich definiert. Anders als in der Neuen Welt steht auf dem Etikett oft die <b>Herkunft</b> statt der Rebsorte im Vordergrund.</p>", "Regionen Europa": "<p>Neben Frankreich und Deutschland prägen weitere europäische Länder den Weinbau: <b>Italien</b> (Sangiovese im Chianti, Nebbiolo im Barolo, Prosecco), <b>Spanien</b> (Tempranillo in Rioja, Sherry, Cava), <b>Portugal</b> (Portwein, Vinho Verde) sowie Österreich (Grüner Veltliner) und Griechenland.</p>\n<p>Europäische Weingesetze betonen die <b>geschützte Ursprungsbezeichnung</b> (g.U./DOP/DOCG/DO). Viele klassische Stile – von Barolo bis Sherry – sind eng an ihre Region und traditionelle Verfahren gebunden.</p>", "Neue Welt": "<p>Als <b>Neue Welt</b> bezeichnet man Weinländer außerhalb Europas: USA (Kalifornien, v. a. Napa Valley), Australien, Neuseeland (Sauvignon Blanc aus Marlborough), Chile, Argentinien (Malbec), Südafrika. Sie stehen oft für reife, fruchtbetonte Weine und <b>Rebsortenetiketten</b> (die Traube steht im Vordergrund).</p>\n<p>Wärmeres Klima ergibt häufig höhere Reife, mehr Alkohol und weichere Säure. Die Neue Welt war zudem Vorreiter bei Innovation, Markenbildung und einem zugänglichen, sortentypischen Stil.</p>", "Schaumwein": "<p><b>Schaumwein</b> erhält seine Kohlensäure durch eine zweite Gärung. Bei der <b>traditionellen Methode</b> (méthode traditionnelle) findet diese in der Flasche statt – so entstehen <b>Champagner</b> (nur aus der Champagne), <b>Crémant</b>, spanischer <b>Cava</b> und hochwertiger <b>Sekt</b>. <b>Prosecco</b> entsteht meist im Tank (Charmat-Methode), was fruchtiger und einfacher schmeckt.</p>\n<p>Süßegrade reichen von <b>Brut Nature/Zero</b> (knochentrocken) über <b>Brut</b> und <b>Extra Dry</b> bis <b>Demi-Sec</b>. Champagner serviert man ideal bei 6–8 °C. Der charakteristische Hefeton stammt vom langen Reifen auf der Hefe (sur lie).</p>", "Süßwein & Rosé": "<p><b>Süßweine</b> entstehen, wenn die Gärung mit Restzucker gestoppt wird oder die Trauben besonders zuckerreich sind – etwa durch <b>Edelfäule</b> (Botrytis, z. B. Sauternes, Trockenbeerenauslese), durch Eintrocknen, durch Gefrieren am Stock (<b>Eiswein</b>) oder durch Aufspriten (Port, Sherry).</p>\n<p><b>Rosé</b> wird aus roten Trauben mit nur kurzem Schalenkontakt gewonnen – wenige Stunden genügen für die zarte Farbe. Guter Rosé ist meist trocken, frisch und kühl zu genießen, kein süßer „Verschnitt\".</p>", "Ikonen-Weine": "<p>Einige Weine gelten als Ikonen und Maßstäbe ihres Stils: die <b>Premiers Crus</b> von Bordeaux (Lafite, Latour, Margaux, Haut-Brion, Mouton), die Spitzenlagen Burgunds (Romanée-Conti), <b>Barolo</b> und <b>Brunello</b> in Italien, sowie legendäre Champagner.</p>\n<p>Solche Weine verbinden herausragendes <b>Terroir</b>, lange Tradition und hohe Lagerfähigkeit – und erzielen am Markt Spitzenpreise. Sie dienen als Referenz, an der sich andere Erzeuger orientieren.</p>", "Aromarad & Verkostung": "<p>Das <b>Aromarad</b> ordnet Duft- und Geschmackseindrücke in Kategorien (z. B. fruchtig, blumig, würzig, vegetabil, holzig) und immer feinere Unterbegriffe. Es hilft, diffuse Eindrücke zu benennen und das sensorische Gedächtnis zu trainieren – nutze dazu den eigenen <b>Aromarad-Tab</b>.</p>\n<p>Beim Verkosten arbeitet man vom Allgemeinen zum Konkreten: erst die Kategorie (z. B. „Frucht\"), dann die Gruppe (z. B. „Steinobst\"), dann das konkrete Aroma (z. B. „Aprikose\"). Aromen entstehen aus Rebsorte, Gärung und Reifung.</p>"}};
document.documentElement.style.setProperty('--brand',APP.color);
const m=document.createElement('meta');m.name='theme-color';m.content=APP.color;document.head.appendChild(m);
document.title=APP.title+' – Nachschlagewerk';
document.getElementById('brand').innerHTML=APP.brand;
document.getElementById('logo').textContent=APP.ic;
document.getElementById('foot').textContent=APP.title+' · Nachschlagewerk · '+APP.entries.length+' Einträge';
// tabs
const tabsDef=[['look','Nachschlagen']];
if(APP.aroma)tabsDef.push(['aroma','Aromarad']);
tabsDef.push(['src','Quellen']);
const tabsEl=document.getElementById('tabs');
tabsDef.forEach((t,i)=>{const b=document.createElement('button');b.textContent=t[1];if(i===0)b.classList.add('active');
  b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('v-'+t[0]).classList.add('active');window.scrollTo({top:0});};
  tabsEl.appendChild(b);});
// chips
let activeCat='__all__';
const chipsEl=document.getElementById('chips');
function mkChip(label,val){const b=document.createElement('button');b.className='chip'+(val===activeCat?' active':'');b.textContent=label;
  b.onclick=()=>{activeCat=val;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));b.classList.add('active');render();};return b;}
chipsEl.appendChild(mkChip('Alle','__all__'));
APP.order.forEach(c=>{const ic=APP.icons[c]?APP.icons[c]+' ':'';chipsEl.appendChild(mkChip(ic+c,c));});
// render
const strip=s=>(s||'').replace(/<[^>]+>/g,'');
const searchEl=document.getElementById('search');
function render(){
  const q=searchEl.value.trim().toLowerCase();
  const cats=activeCat==='__all__'?APP.order:[activeCat];
  const list=document.getElementById('list');list.innerHTML='';
  let total=0;
  cats.forEach(cat=>{
    let items=APP.entries.filter(e=>e.cat===cat);
    if(q)items=items.filter(e=>(e.q+' '+strip(e.ans)+' '+strip(e.fb)).toLowerCase().includes(q));
    if(!items.length)return;
    total+=items.length;
    const block=document.createElement('div');block.className='catblock';
    const ic=APP.icons[cat]?'<span class="ic">'+APP.icons[cat]+'</span>':'';
    const art=(APP.articles&&APP.articles[cat])?'<div class="article">'+APP.articles[cat]+'</div>':'';
    block.innerHTML='<h2>'+ic+cat+'</h2>'+art+(items.length?'<div class="factlabel">Fakten &amp; Details</div>':'')+items.map(e=>{
      let s='<div class="entry"><div class="q">'+e.q+'</div>';
      if(e.ans)s+='<div class="ans"><span class="lab">Antwort:</span> '+e.ans+'</div>';
      if(e.fb)s+='<div class="fb">'+e.fb+'</div>';
      return s+'</div>';
    }).join('');
    list.appendChild(block);
  });
  document.getElementById('count').textContent=total+' Einträge'+(q?' für „'+searchEl.value+'"':'')+(activeCat!=='__all__'?' in '+activeCat:'');
  if(!total)list.innerHTML='<div class="empty">Nichts gefunden.</div>';
}
searchEl.addEventListener('input',render);
// sources
document.getElementById('srclist').innerHTML=APP.sources.map(s=>'<div class="src"><b>'+s[0]+'</b><p>'+s[1]+'</p></div>').join('');
render();
</script>
