<style>
:root{--bg:#f7f6f2;--panel:#fff;--ink:#1c1b18;--muted:#6b6862;--line:#e7e4dc;
  --brand:#3b6e58;--brandink:#fff;--soft:#f0eee9;--hover:#f3f0fa;
  --shadow:0 8px 24px rgba(40,30,20,.07);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
[data-theme="dark"]{--bg:#15131a;--panel:#1d1a24;--ink:#ece8f1;--muted:#a49db4;--line:#322c3c;
  --soft:#241f2e;--hover:#262031;--brandink:#fff;--shadow:0 8px 24px rgba(0,0,0,.4)}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.6;-webkit-text-size-adjust:100%}
a{color:var(--brand)}
header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hd{max-width:1100px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-size:19px;background:var(--brand);color:#fff;flex:0 0 auto;border:none;cursor:pointer;padding:0}
.ttl b{font-size:16px;font-weight:800;display:block;line-height:1.1}
.ttl span{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
.hd .sp{flex:1}
.search{width:min(340px,42vw);font:inherit;font-size:14px;color:var(--ink);background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:9px 13px}
.search:focus{outline:none;border-color:var(--brand)}
.iconbtn{background:var(--panel);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;width:38px;height:38px;font-size:16px;cursor:pointer;flex:0 0 auto}
.menubtn{display:none}
.shell{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:280px 1fr;gap:0}
aside{border-right:1px solid var(--line);padding:18px 10px 60px;height:calc(100vh - 58px);overflow:auto;position:sticky;top:58px}
.cat{margin-bottom:4px}
.cat>.catname{display:flex;align-items:center;gap:7px;width:100%;text-align:left;font:inherit;font-weight:700;font-size:14px;color:var(--ink);
  background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:8px}
.cat>.catname:hover{background:var(--soft)}
.cat>.catname .tw{margin-left:auto;color:var(--muted);font-size:11px;transition:.15s}
.cat.collapsed .children{display:none}
.cat.collapsed .tw{transform:rotate(-90deg)}
.children{padding-left:6px}
.subname{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:8px 10px 3px}
.alink{display:block;font:inherit;text-align:left;width:100%;background:none;border:none;color:var(--ink);cursor:pointer;
  padding:6px 10px 6px 22px;border-radius:7px;font-size:13.5px;line-height:1.35}
.alink:hover{background:var(--soft)}
.alink.active{background:var(--brand);color:var(--brandink);font-weight:600}
main{padding:26px 30px 80px;min-width:0;max-width:780px}
.crumb{font-size:12.5px;color:var(--muted);margin-bottom:6px}
.art h1{font-size:30px;margin:0 0 14px;line-height:1.15;font-weight:800}
.art h2{font-size:21px;margin:26px 0 8px}
.art h3{font-size:17px;margin:20px 0 6px}
.art p{margin:0 0 13px}
.art ul{margin:0 0 13px;padding-left:20px}.art li{margin-bottom:5px}
.art a.ilink{color:var(--brand);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--brand) 35%,transparent);cursor:pointer}
.art a.ilink:hover{border-bottom-color:var(--brand)}
.lead{font-size:16.5px;color:var(--ink)}
.box{background:var(--soft);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:12px;padding:12px 16px;margin:14px 0;font-size:14.5px}
.seealso{margin-top:26px;border-top:1px solid var(--line);padding-top:14px}
.seealso b{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.seealso .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.seealso .chips a{font-size:13px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 12px;text-decoration:none;color:var(--brand)}
.aromaframe{width:100%;height:72vh;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
.results .alink{padding-left:10px}
.sidebackdrop{display:none}
@media(max-width:820px){
 .hd{padding-top:calc(env(safe-area-inset-top) + 22px);padding-bottom:12px}
 .iconbtn,.menubtn{width:44px;height:44px;font-size:18px}
 .shell{grid-template-columns:1fr}
 aside{position:fixed;top:0;left:0;bottom:0;width:280px;height:100vh;z-index:40;background:var(--panel);transform:translateX(-105%);transition:.25s;padding-top:16px}
 aside.open{transform:none}
 .sidebackdrop.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
 .menubtn{display:grid;place-items:center}
 main{padding:20px 16px 70px}
 .search{width:auto;flex:1}
 .ttl{display:none}
}
</style>
</head>

<script>
const APP={"title": "Wein", "brand": "Vi<b>no</b>", "color": "#7a1f3d", "ic": "🍷", "articles": [{"slug": "wein-verstehen", "title": "Wein verstehen", "crumb": "Grundlagen", "body": "<p><b>Wein</b> entsteht durch die <b>alkoholische Gärung</b> von Traubensaft: Hefen wandeln den Zucker des <b>Mosts</b> in Alkohol (Ethanol) und Kohlendioxid um. Der Zucker, der nicht vergoren wird, bleibt als <b>Restzucker</b> erhalten und bestimmt den Süßegrad – als <i>trocken</i> gilt in der EU faustregelartig ein Wein bis etwa 9 g/l Restzucker.</p>\n<p>Der zentrale Unterschied zwischen Rot- und Weißwein liegt nicht in der Traubenfarbe allein, sondern in der Verarbeitung: Rotwein vergärt auf der <b>Maische</b> (mitsamt Schalen), wodurch Farbstoffe und <b><a class=\"ilink\" data-s=\"tannin\">Tannine</a></b> (Gerbstoffe aus Schalen, Kernen und Stielen) in den Wein gelangen. Weißwein wird meist ohne Schalenkontakt gekeltert. Der <b>Ausbau</b> erfolgt im neutralen Edelstahl (frisch, fruchtig) oder im <b><a class=\"ilink\" data-s=\"ausbau-barrique\">Barrique</a></b> (Eichenfass, gibt Vanille- und Röstnoten sowie Struktur).</p>", "rel": ["tannin", "saeure", "terroir", "ausbau-barrique"]}, {"slug": "tannin", "title": "Tannin", "crumb": "Grundlagen", "body": "<p class=\"lead\">Tannine (Gerbstoffe) sind pflanzliche Verbindungen, die einem Wein Struktur und Lagerfähigkeit geben.</p>\n<p>Sie stammen vor allem aus <b>Schalen, Kernen und Stielen</b> der Trauben sowie aus dem Holz von <a class=\"ilink\" data-s=\"ausbau-barrique\">Barrique-Fässern</a>. Weil <a class=\"ilink\" data-s=\"rote-rebsorten\">Rotwein</a> auf der <a class=\"ilink\" data-s=\"wein-verstehen\">Maische</a> (mit Schalen) vergärt, ist er deutlich tanninreicher als Weißwein.</p>\n<p>Am Gaumen zeigt sich Tannin als <b>zusammenziehendes, trocknendes Gefühl</b> – nicht zu verwechseln mit <a class=\"ilink\" data-s=\"saeure\">Säure</a>. Mit der Reife polymerisieren Tannine und werden weicher; deshalb profitieren tanninreiche Weine vom Altern oder vom <a class=\"ilink\" data-s=\"servieren-geniessen\">Dekantieren</a>.</p>", "rel": ["wein-verstehen", "saeure", "terroir", "ausbau-barrique"]}, {"slug": "saeure", "title": "Säure", "crumb": "Grundlagen", "body": "<p class=\"lead\">Säure ist das Rückgrat eines Weins – sie sorgt für Frische, Spannung und Haltbarkeit.</p>\n<p>Kühles Klima erhält mehr Säure, warmes Klima baut sie ab. Hohe Säure macht den Mund „wässrig\" und lässt Weine lebendig wirken; sie ist auch der Grund, warum säurebetonte Weine wie <a class=\"ilink\" data-s=\"riesling\">Riesling</a> besonders gut zu Essen passen und lange reifen können.</p>\n<p>Säure, <a class=\"ilink\" data-s=\"tannin\">Tannin</a>, Süße (<a class=\"ilink\" data-s=\"wein-verstehen\">Restzucker</a>) und Alkohol bilden zusammen das Geschmacksgerüst – ist es ausgewogen, wirkt der Wein harmonisch.</p>", "rel": ["wein-verstehen", "tannin", "terroir", "ausbau-barrique"]}, {"slug": "terroir", "title": "Terroir", "crumb": "Grundlagen", "body": "<p class=\"lead\">„Terroir\" bezeichnet das Zusammenspiel von Boden, Klima, Lage und menschlichem Handwerk, das einem Wein seine Herkunft einprägt.</p>\n<p>Dieselbe Rebsorte schmeckt auf Schiefer (etwa an der <a class=\"ilink\" data-s=\"regionen-deutschland\">Mosel</a>) anders als auf Kalk in <a class=\"ilink\" data-s=\"burgund\">Burgund</a>. Das Terroir-Denken steht im Zentrum der europäischen, vor allem der <a class=\"ilink\" data-s=\"regionen-frankreich\">französischen</a> Weinkultur und ihrer <a class=\"ilink\" data-s=\"regionen-frankreich\">Appellationen</a>.</p>", "rel": ["wein-verstehen", "tannin", "saeure", "ausbau-barrique"]}, {"slug": "ausbau-barrique", "title": "Ausbau & Barrique", "crumb": "Grundlagen", "body": "<p class=\"lead\">Der Ausbau ist die Reifephase nach der Gärung – sie prägt Textur und Aroma entscheidend.</p>\n<p>Im neutralen <b>Edelstahltank</b> bleibt der Wein frisch und fruchtig. Im <b>Barrique</b> (kleines Eichenfass) nimmt er Vanille-, Röst- und Würznoten auf, gewinnt <a class=\"ilink\" data-s=\"tannin\">Struktur</a> und wird durch den minimalen Sauerstoffkontakt runder. Wie stark das Holz prägt, hängt von Fassgröße, Alter und Toasting ab.</p>", "rel": ["wein-verstehen", "tannin", "saeure", "terroir"]}, {"slug": "geschmack-verkostung", "title": "Geschmack & Verkostung", "crumb": "Verkostung & Aromen", "body": "<p>Wein wird über vier Grundkomponenten beurteilt: <b><a class=\"ilink\" data-s=\"saeure\">Säure</a></b>, <b><a class=\"ilink\" data-s=\"tannin\">Tannin</a></b>, <b>Süße</b> und <b>Alkohol</b>, die im Idealfall ausbalanciert sind und zusammen den <b>Körper</b> ergeben. Aromen teilt man in <b><a class=\"ilink\" data-s=\"aromakategorien\">Primäraromen</a></b> (aus der Rebsorte), <b>Sekundäraromen</b> (aus Gärung/Ausbau) und <b>Tertiäraromen</b> (aus der Reifung) ein.</p>\n<p>Eine systematische Verkostung folgt dem Dreischritt <b>Sehen – Riechen – Schmecken</b>: Farbe und Viskosität, dann das Bukett, schließlich Geschmack, Struktur und <b>Abgang</b> (wie lange der Eindruck nachklingt). Geübtes Verkosten schult vor allem die Nase – der Großteil des „Geschmacks\" ist Geruch.</p>", "rel": ["aromakategorien", "aromarad"]}, {"slug": "aromakategorien", "title": "Primär-, Sekundär- & Tertiäraromen", "crumb": "Verkostung & Aromen", "body": "<p class=\"lead\">Weinaromen lassen sich nach ihrer Entstehung in drei Gruppen einteilen.</p>\n<p><b>Primäraromen</b> stammen aus der Rebsorte und Traube (Frucht, Blüten). <b>Sekundäraromen</b> entstehen bei Gärung und <a class=\"ilink\" data-s=\"ausbau-barrique\">Ausbau</a> (Hefe, Brot, Vanille aus Holz). <b>Tertiäraromen</b> bilden sich bei der Reifung (Leder, Trockenfrüchte, Petrol beim reifen <a class=\"ilink\" data-s=\"riesling\">Riesling</a>). Das <a class=\"ilink\" data-s=\"aromarad\">Aromarad</a> hilft, sie zu benennen.</p>", "rel": ["geschmack-verkostung", "aromarad"]}, {"slug": "aromarad", "title": "Aromarad", "crumb": "Verkostung & Aromen", "body": "<p class=\"lead\">Das interaktive Aromarad ordnet Weinaromen von der groben Familie (Frucht, Blüte, Würze, Holz) bis zur konkreten Note. Klick dich durch die Ebenen.</p><iframe class=\"aromaframe\" data-base=\"aromarad.html\" src=\"aromarad.html?theme=light\" title=\"Aromarad\" loading=\"lazy\"></iframe><p style=\"margin-top:12px\">Vom Allgemeinen zum Konkreten arbeiten – siehe auch <a class=\"ilink\" data-s=\"aromakategorien\">Primär-, Sekundär- & Tertiäraromen</a>.</p>", "rel": ["geschmack-verkostung", "aromakategorien"]}, {"slug": "weisse-rebsorten", "title": "Weiße Rebsorten (Überblick)", "crumb": "Rebsorten › Weiße Rebsorten", "body": "<p>Zu den wichtigsten weißen Rebsorten zählen <b><a class=\"ilink\" data-s=\"riesling\">Riesling</a></b> (kühles Klima, hohe <a class=\"ilink\" data-s=\"saeure\">Säure</a>, lagerfähig, von trocken bis edelsüß), <b><a class=\"ilink\" data-s=\"chardonnay\">Chardonnay</a></b> (wandlungsfähig, oft im <a class=\"ilink\" data-s=\"ausbau-barrique\">Barrique</a>, weltweit verbreitet), <b><a class=\"ilink\" data-s=\"sauvignon-blanc\">Sauvignon Blanc</a></b> (grasig-fruchtig, knackige Säure), <b>Grauburgunder/Pinot Gris</b> und <b>Weißburgunder/Pinot Blanc</b>.</p>\n<p>Der Charakter einer Sorte hängt stark vom Klima ab: dieselbe Rebe ergibt in kühler Lage säurebetonte, schlanke Weine, in warmer Lage vollere, fruchtigere. Riesling gilt als die deutsche Vorzeigesorte und als eine der wenigen, die ihr Anbaugebiet (das <b><a class=\"ilink\" data-s=\"terroir\">Terroir</a></b>) besonders deutlich abbildet.</p>", "rel": ["riesling", "chardonnay", "sauvignon-blanc"]}, {"slug": "riesling", "title": "Riesling", "crumb": "Rebsorten › Weiße Rebsorten", "body": "<p class=\"lead\">Riesling gilt als die edelste deutsche Weißweinsorte und als einer der besten <a class=\"ilink\" data-s=\"terroir\">Terroir</a>-Vermittler überhaupt.</p>\n<p>Charakteristisch sind eine <b>hohe <a class=\"ilink\" data-s=\"saeure\">Säure</a></b>, Aromen von Apfel, Zitrus und Pfirsich sowie – mit Reife – der typische „Petrol\"-Ton. Riesling gelingt in allen Süßegraden, von knochentrocken bis edelsüß, und ist hervorragend <a class=\"ilink\" data-s=\"ikonen-weine\">lagerfähig</a>. Kerngebiete sind <a class=\"ilink\" data-s=\"regionen-deutschland\">Mosel, Rheingau und Pfalz</a>.</p>", "rel": ["weisse-rebsorten", "chardonnay", "sauvignon-blanc"]}, {"slug": "chardonnay", "title": "Chardonnay", "crumb": "Rebsorten › Weiße Rebsorten", "body": "<p class=\"lead\">Chardonnay ist die wandlungsfähigste weiße Rebsorte der Welt.</p>\n<p>Je nach Klima und <a class=\"ilink\" data-s=\"ausbau-barrique\">Ausbau</a> reicht das Spektrum von stählern-mineralisch (Chablis) bis cremig-butterig (im <a class=\"ilink\" data-s=\"ausbau-barrique\">Barrique</a>). Ihre Heimat ist <a class=\"ilink\" data-s=\"burgund\">Burgund</a>; sie ist außerdem eine der drei <a class=\"ilink\" data-s=\"champagne\">Champagner</a>-Rebsorten und in der ganzen <a class=\"ilink\" data-s=\"neue-welt\">Neuen Welt</a> verbreitet.</p>", "rel": ["weisse-rebsorten", "riesling", "sauvignon-blanc"]}, {"slug": "sauvignon-blanc", "title": "Sauvignon Blanc", "crumb": "Rebsorten › Weiße Rebsorten", "body": "<p class=\"lead\">Sauvignon Blanc ist eine intensiv aromatische Sorte mit markanter <a class=\"ilink\" data-s=\"saeure\">Säure</a>.</p>\n<p>Typisch sind grasige, krautige Noten und Stachelbeere oder Maracuja. Berühmt sind die Loire (Sancerre) und <a class=\"ilink\" data-s=\"neue-welt\">Neuseeland</a> (Marlborough). Meist wird die Sorte frisch im Stahltank ausgebaut.</p>", "rel": ["weisse-rebsorten", "riesling", "chardonnay"]}, {"slug": "rote-rebsorten", "title": "Rote Rebsorten (Überblick)", "crumb": "Rebsorten › Rote Rebsorten", "body": "<p>Bedeutende rote Sorten sind <b><a class=\"ilink\" data-s=\"cabernet-sauvignon\">Cabernet Sauvignon</a></b> (tanninreich, lagerfähig, Cassis), <b><a class=\"ilink\" data-s=\"merlot\">Merlot</a></b> (weicher, fruchtig), <b>Pinot Noir/<a class=\"ilink\" data-s=\"pinot-noir\">Spätburgunder</a></b> (hell, elegant, anspruchsvoll im Anbau), <b>Syrah/<a class=\"ilink\" data-s=\"syrah\">Shiraz</a></b>, <b>Tempranillo</b> (Spanien) und <b>Sangiovese</b> (Italien, Chianti).</p>\n<p>Der Tanningehalt hängt von Rebsorte, Dauer des Schalenkontakts, Holzausbau und Reife ab. Viele große Rotweine sind <b>Cuvées</b> (Verschnitte mehrerer Sorten), etwa die klassische <a class=\"ilink\" data-s=\"bordeaux\">Bordeaux</a>-Mischung aus Cabernet Sauvignon, Merlot und Cabernet Franc.</p>", "rel": ["cabernet-sauvignon", "merlot", "pinot-noir", "syrah"]}, {"slug": "cabernet-sauvignon", "title": "Cabernet Sauvignon", "crumb": "Rebsorten › Rote Rebsorten", "body": "<p class=\"lead\">Cabernet Sauvignon ist die wohl bekannteste rote Rebsorte – tanninreich und langlebig.</p>\n<p>Sie liefert Aromen von schwarzer Johannisbeere (Cassis), kräftiges <a class=\"ilink\" data-s=\"tannin\">Tannin</a> und viel Struktur. Im <a class=\"ilink\" data-s=\"bordeaux\">Bordeaux</a> bildet sie das Rückgrat der klassischen Cuvée mit <a class=\"ilink\" data-s=\"merlot\">Merlot</a>; in <a class=\"ilink\" data-s=\"neue-welt\">Napa Valley</a> entstehen kraftvolle reinsortige Weine.</p>", "rel": ["rote-rebsorten", "merlot", "pinot-noir", "syrah"]}, {"slug": "merlot", "title": "Merlot", "crumb": "Rebsorten › Rote Rebsorten", "body": "<p class=\"lead\">Merlot ergibt weichere, fruchtigere und früher zugängliche Rotweine.</p>\n<p>Mit pflaumiger Frucht und sanftem <a class=\"ilink\" data-s=\"tannin\">Tannin</a> ist Merlot ein idealer Cuvée-Partner für <a class=\"ilink\" data-s=\"cabernet-sauvignon\">Cabernet Sauvignon</a> und dominiert am rechten Ufer des <a class=\"ilink\" data-s=\"bordeaux\">Bordeaux</a> (Pomerol, Saint-Émilion).</p>", "rel": ["rote-rebsorten", "cabernet-sauvignon", "pinot-noir", "syrah"]}, {"slug": "pinot-noir", "title": "Pinot Noir / Spätburgunder", "crumb": "Rebsorten › Rote Rebsorten", "body": "<p class=\"lead\">Pinot Noir gilt als die anspruchsvollste, eleganteste rote Rebsorte.</p>\n<p>Die Weine sind hell, fein und <a class=\"ilink\" data-s=\"tannin\">tanninarm</a>, mit Aromen roter Beeren. Die Sorte ist heikel im Anbau und spiegelt das <a class=\"ilink\" data-s=\"terroir\">Terroir</a> besonders deutlich – ihre Heimat ist <a class=\"ilink\" data-s=\"burgund\">Burgund</a>. In Deutschland heißt sie Spätburgunder.</p>", "rel": ["rote-rebsorten", "cabernet-sauvignon", "merlot", "syrah"]}, {"slug": "syrah", "title": "Syrah / Shiraz", "crumb": "Rebsorten › Rote Rebsorten", "body": "<p class=\"lead\">Syrah liefert dunkle, würzige und kraftvolle Rotweine.</p>\n<p>Typisch sind Aromen von dunklen Beeren, schwarzem Pfeffer und Rauch. In der nördlichen <a class=\"ilink\" data-s=\"regionen-frankreich\">Rhône</a> (Hermitage) entstehen elegante Versionen, als „Shiraz\" in <a class=\"ilink\" data-s=\"neue-welt\">Australien</a> besonders wuchtige.</p>", "rel": ["rote-rebsorten", "cabernet-sauvignon", "merlot", "pinot-noir"]}, {"slug": "regionen-deutschland", "title": "Regionen Deutschland", "crumb": "Regionen › Deutschland", "body": "<p>Deutschland hat 13 Anbaugebiete, geprägt von kühlem Klima und steilen Flusslagen. Wichtige Regionen sind <b>Mosel</b> (<a class=\"ilink\" data-s=\"riesling\">Riesling</a> von Schieferböden, filigran), <b>Rheingau</b> und <b>Pfalz</b> (kräftigere Rieslinge), <b>Baden</b> (wärmer, Burgundersorten) und <b>Franken</b> (Silvaner, Bocksbeutel).</p>\n<p>Das deutsche Qualitätssystem unterscheidet u. a. <b>Prädikatswein</b> mit Stufen nach Mostgewicht: Kabinett, Spätlese, Auslese, Beerenauslese, Trockenbeerenauslese und <a class=\"ilink\" data-s=\"suesswein-rose\">Eiswein</a>. Der <b>VDP</b> (Verband Deutscher Prädikatsweingüter) nutzt zusätzlich eine Lagenklassifikation bis hin zum <b>Großen Gewächs</b> (GG) für trockene Spitzenweine.</p>", "rel": []}, {"slug": "regionen-frankreich", "title": "Regionen Frankreich", "crumb": "Regionen › Frankreich", "body": "<p>Frankreich gilt als Mutterland vieler Stile. <b><a class=\"ilink\" data-s=\"bordeaux\">Bordeaux</a></b> (Cuvées aus Cabernet/<a class=\"ilink\" data-s=\"merlot\">Merlot</a>), <b><a class=\"ilink\" data-s=\"burgund\">Burgund</a>/Bourgogne</b> (reinsortig <a class=\"ilink\" data-s=\"pinot-noir\">Pinot Noir</a> und <a class=\"ilink\" data-s=\"chardonnay\">Chardonnay</a>, kleinteilige Lagen), <b><a class=\"ilink\" data-s=\"champagne\">Champagne</a></b> (<a class=\"ilink\" data-s=\"schaumwein\">Schaumwein</a>), <b>Rhône</b> (<a class=\"ilink\" data-s=\"syrah\">Syrah</a>, Grenache) und das <b>Loire</b>-Tal sind die bekanntesten Regionen.</p>\n<p>Frankreich prägte das Konzept der <b>Appellation (AOC/AOP)</b>: Herkunft, erlaubte Rebsorten und Anbauregeln sind gesetzlich definiert. Anders als in der Neuen Welt steht auf dem Etikett oft die <b>Herkunft</b> statt der Rebsorte im Vordergrund.</p>", "rel": ["bordeaux", "burgund", "champagne"]}, {"slug": "bordeaux", "title": "Bordeaux", "crumb": "Regionen › Frankreich", "body": "<p class=\"lead\">Bordeaux ist die größte und berühmteste Qualitätsweinregion Frankreichs, bekannt für seine roten Cuvées.</p>\n<p>Am linken Ufer dominiert <a class=\"ilink\" data-s=\"cabernet-sauvignon\">Cabernet Sauvignon</a>, am rechten <a class=\"ilink\" data-s=\"merlot\">Merlot</a>. Die <a class=\"ilink\" data-s=\"ikonen-weine\">Premiers Crus</a> (Lafite, Latour, Margaux, Haut-Brion, Mouton) gehen auf die Klassifikation von 1855 zurück. Auch trockene und edelsüße Weißweine (Sauternes) kommen von hier.</p>", "rel": ["regionen-frankreich", "burgund", "champagne"]}, {"slug": "burgund", "title": "Burgund / Bourgogne", "crumb": "Regionen › Frankreich", "body": "<p class=\"lead\">Burgund steht für reinsortige Weine aus <a class=\"ilink\" data-s=\"pinot-noir\">Pinot Noir</a> und <a class=\"ilink\" data-s=\"chardonnay\">Chardonnay</a> und für ein extrem kleinteiliges Lagensystem.</p>\n<p>Die einzelnen „Climats\" und die Hierarchie von Regional- über Village- und Premier-Cru- bis Grand-Cru-Lagen machen Burgund zum Inbegriff des <a class=\"ilink\" data-s=\"terroir\">Terroirs</a>. Spitzenlagen wie Romanée-Conti zählen zu den teuersten Weinen der Welt.</p>", "rel": ["regionen-frankreich", "bordeaux", "champagne"]}, {"slug": "champagne", "title": "Champagne & Champagner", "crumb": "Regionen › Frankreich", "body": "<p class=\"lead\">Champagner ist der berühmteste <a class=\"ilink\" data-s=\"schaumwein\">Schaumwein</a> – nur <a class=\"ilink\" data-s=\"schaumwein\">Schaumwein</a> aus der Champagne darf so heißen.</p>\n<p>Er entsteht durch die <b>traditionelle Flaschengärung</b> aus <a class=\"ilink\" data-s=\"chardonnay\">Chardonnay</a>, <a class=\"ilink\" data-s=\"pinot-noir\">Pinot Noir</a> und Pinot Meunier. Lange Hefereife gibt die typischen Brioche-Noten. Süßegrade reichen von Brut Nature bis Demi-Sec; ideal sind 6–8 °C.</p>", "rel": ["regionen-frankreich", "bordeaux", "burgund"]}, {"slug": "regionen-europa", "title": "Regionen Europa", "crumb": "Regionen › Übriges Europa", "body": "<p>Neben Frankreich und Deutschland prägen weitere europäische Länder den Weinbau: <b>Italien</b> (Sangiovese im Chianti, Nebbiolo im Barolo, Prosecco), <b>Spanien</b> (Tempranillo in Rioja, Sherry, Cava), <b>Portugal</b> (Portwein, Vinho Verde) sowie Österreich (Grüner Veltliner) und Griechenland.</p>\n<p>Europäische Weingesetze betonen die <b>geschützte Ursprungsbezeichnung</b> (g.U./DOP/DOCG/DO). Viele klassische Stile – von Barolo bis Sherry – sind eng an ihre Region und traditionelle Verfahren gebunden.</p>", "rel": []}, {"slug": "neue-welt", "title": "Neue Welt", "crumb": "Regionen › Neue Welt", "body": "<p>Als <b>Neue Welt</b> bezeichnet man Weinländer außerhalb Europas: USA (Kalifornien, v. a. Napa Valley), Australien, Neuseeland (<a class=\"ilink\" data-s=\"sauvignon-blanc\">Sauvignon Blanc</a> aus Marlborough), Chile, Argentinien (Malbec), Südafrika. Sie stehen oft für reife, fruchtbetonte Weine und <b>Rebsortenetiketten</b> (die Traube steht im Vordergrund).</p>\n<p>Wärmeres Klima ergibt häufig höhere Reife, mehr Alkohol und weichere <a class=\"ilink\" data-s=\"saeure\">Säure</a>. Die Neue Welt war zudem Vorreiter bei Innovation, Markenbildung und einem zugänglichen, sortentypischen Stil.</p>", "rel": []}, {"slug": "schaumwein", "title": "Schaumwein", "crumb": "Besondere Weine", "body": "<p><b>Schaumwein</b> erhält seine Kohlensäure durch eine zweite Gärung. Bei der <b>traditionellen Methode</b> (méthode traditionnelle) findet diese in der Flasche statt – so entstehen <b><a class=\"ilink\" data-s=\"champagne\">Champagner</a></b> (nur aus der Champagne), <b>Crémant</b>, spanischer <b>Cava</b> und hochwertiger <b>Sekt</b>. <b>Prosecco</b> entsteht meist im Tank (Charmat-Methode), was fruchtiger und einfacher schmeckt.</p>\n<p>Süßegrade reichen von <b>Brut Nature/Zero</b> (knochentrocken) über <b>Brut</b> und <b>Extra Dry</b> bis <b>Demi-Sec</b>. Champagner serviert man ideal bei 6–8 °C. Der charakteristische Hefeton stammt vom langen Reifen auf der Hefe (sur lie).</p>", "rel": ["suesswein-rose", "ikonen-weine"]}, {"slug": "suesswein-rose", "title": "Süßwein & Rosé", "crumb": "Besondere Weine", "body": "<p><b>Süßweine</b> entstehen, wenn die Gärung mit <a class=\"ilink\" data-s=\"wein-verstehen\">Restzucker</a> gestoppt wird oder die Trauben besonders zuckerreich sind – etwa durch <b>Edelfäule</b> (Botrytis, z. B. Sauternes, Trockenbeerenauslese), durch Eintrocknen, durch Gefrieren am Stock (<b>Eiswein</b>) oder durch Aufspriten (Port, Sherry).</p>\n<p><b>Rosé</b> wird aus roten Trauben mit nur kurzem Schalenkontakt gewonnen – wenige Stunden genügen für die zarte Farbe. Guter Rosé ist meist trocken, frisch und kühl zu genießen, kein süßer „Verschnitt\".</p>", "rel": ["schaumwein", "ikonen-weine"]}, {"slug": "ikonen-weine", "title": "Ikonen-Weine", "crumb": "Besondere Weine", "body": "<p>Einige Weine gelten als Ikonen und Maßstäbe ihres Stils: die <b>Premiers Crus</b> von <a class=\"ilink\" data-s=\"bordeaux\">Bordeaux</a> (Lafite, Latour, Margaux, Haut-Brion, Mouton), die Spitzenlagen Burgunds (Romanée-Conti), <b>Barolo</b> und <b>Brunello</b> in Italien, sowie legendäre <a class=\"ilink\" data-s=\"champagne\">Champagner</a>.</p>\n<p>Solche Weine verbinden herausragendes <b><a class=\"ilink\" data-s=\"terroir\">Terroir</a></b>, lange Tradition und hohe Lagerfähigkeit – und erzielen am Markt Spitzenpreise. Sie dienen als Referenz, an der sich andere Erzeuger orientieren.</p>", "rel": ["schaumwein", "suesswein-rose"]}, {"slug": "servieren-geniessen", "title": "Servieren & Genießen", "crumb": "Servieren & Genießen", "body": "<p>Temperatur und Glas prägen den Eindruck stark. Faustregel: Weißweine 8–12 °C, Rotweine 14–18 °C; je gehaltvoller, desto wärmer. Junge tanninreiche Rotweine profitieren vom <b>Dekantieren</b> (Belüftung), alte Weine eher vom vorsichtigen <b>Karaffieren</b> (Trennen vom Depot).</p>\n<p>Bei <b>Speisenkombinationen</b> gilt: Das Gericht und der Wein sollten sich in Intensität, <a class=\"ilink\" data-s=\"saeure\">Säure</a> und Süße ergänzen – Säure passt zu Fettigem, Süßwein zu Blauschimmelkäse oder Dessert. Korken vs. Schraubverschluss sagt nichts über Qualität aus; der Schraubverschluss schützt sogar zuverlässiger vor Kork-Fehltönen.</p>", "rel": []}, {"slug": "quellen", "title": "Quellen & Weiterlesen", "crumb": "Service", "body": "<p class=\"lead\">Wo du dein Wissen vertiefen kannst:</p>\n<ul><li><b>Das Weinlexikon</b> (Jens Priewe) – verständliches Standardwerk auf Deutsch.</li>\n<li><b>The Oxford Companion to Wine</b> (Jancis Robinson) – das wissenschaftliche Referenzwerk (englisch).</li>\n<li><b>Wine Folly</b> – winefolly.com, Grafiken zu Rebsorten und Regionen.</li>\n<li><b>Deutsches Weininstitut</b> – deutscheweine.de, Anbaugebiete und Weinrecht.</li>\n<li><b>Decanter</b> – decanter.com, Verkostungen und Hintergründe.</li></ul>", "rel": []}], "tree": [{"name": "Grundlagen", "ic": "🍇", "slugs": ["wein-verstehen", "tannin", "saeure", "terroir", "ausbau-barrique"], "subs": []}, {"name": "Verkostung & Aromen", "ic": "👅", "slugs": ["geschmack-verkostung", "aromakategorien", "aromarad"], "subs": []}, {"name": "Rebsorten", "ic": "🍷", "slugs": [], "subs": [{"name": "Weiße Rebsorten", "slugs": ["weisse-rebsorten", "riesling", "chardonnay", "sauvignon-blanc"]}, {"name": "Rote Rebsorten", "slugs": ["rote-rebsorten", "cabernet-sauvignon", "merlot", "pinot-noir", "syrah"]}]}, {"name": "Regionen", "ic": "🌍", "slugs": [], "subs": [{"name": "Deutschland", "slugs": ["regionen-deutschland"]}, {"name": "Frankreich", "slugs": ["regionen-frankreich", "bordeaux", "burgund", "champagne"]}, {"name": "Übriges Europa", "slugs": ["regionen-europa"]}, {"name": "Neue Welt", "slugs": ["neue-welt"]}]}, {"name": "Besondere Weine", "ic": "✨", "slugs": ["schaumwein", "suesswein-rose", "ikonen-weine"], "subs": []}, {"name": "Servieren & Genießen", "ic": "🌡️", "slugs": ["servieren-geniessen"], "subs": []}, {"name": "Service", "ic": "📚", "slugs": ["quellen"], "subs": []}]};
var root=document.documentElement;
// ---- theme ----
function initTheme(){var p=new URLSearchParams(location.search).get('theme');var t;
  if(p==='dark'||p==='light')t=p;else{try{t=localStorage.getItem('nsw_theme')||'light'}catch(e){t='light'}}
  applyTheme(t);}
function applyTheme(t){if(t==='dark'){root.setAttribute('data-theme','dark');}else{root.removeAttribute('data-theme');}
  document.getElementById('themebtn').textContent=(t==='dark')?'☀️':'🌙';curTheme=t;
  // update any embedded aroma iframe
  var af=document.querySelector('.aromaframe');if(af){var u=af.getAttribute('data-base');af.src=u+'?theme='+t;}}
var curTheme='light';
document.getElementById('themebtn').onclick=function(){var t=curTheme==='dark'?'light':'dark';try{localStorage.setItem('nsw_theme',t)}catch(e){}applyTheme(t);};
// ---- index ----
var BYSLUG={};APP.articles.forEach(function(a){BYSLUG[a.slug]=a;});
document.title=APP.title+' – Nachschlagewerk';
document.getElementById('brand').innerHTML=APP.brand;
document.getElementById('logo').textContent=APP.ic;
root.style.setProperty('--brand',APP.color);
var meta=document.createElement('meta');meta.name='theme-color';meta.content=APP.color;document.head.appendChild(meta);
// ---- sidebar ----
function buildSidebar(){
  var side=document.getElementById('side');side.innerHTML='';
  APP.tree.forEach(function(c,ci){
    var cat=document.createElement('div');cat.className='cat'+(ci>0?' collapsed':'');
    var btn=document.createElement('button');btn.className='catname';btn.innerHTML=(c.ic?c.ic+' ':'')+c.name+'<span class="tw">▾</span>';
    btn.onclick=function(){cat.classList.toggle('collapsed');};
    cat.appendChild(btn);
    var ch=document.createElement('div');ch.className='children';
    (c.slugs||[]).forEach(function(s){ch.appendChild(mkA(s));});
    (c.subs||[]).forEach(function(sub){
      var sn=document.createElement('div');sn.className='subname';sn.textContent=sub.name;ch.appendChild(sn);
      sub.slugs.forEach(function(s){ch.appendChild(mkA(s));});
    });
    cat.appendChild(ch);side.appendChild(cat);
  });
}
function mkA(slug){var a=BYSLUG[slug];var b=document.createElement('button');b.className='alink';b.dataset.s=slug;b.textContent=a?a.title:slug;b.onclick=function(){go(slug);closeSide();};return b;}
// ---- article render ----
function go(slug){
  var a=BYSLUG[slug];if(!a){a=APP.articles[0];slug=a.slug;}
  if(location.hash!=='#'+slug)history.replaceState(null,'','#'+slug);
  document.querySelectorAll('.alink').forEach(function(x){x.classList.toggle('active',x.dataset.s===slug);});
  // expand the cat containing it
  var m=document.getElementById('main');
  var sa=relatedChips(slug);
  m.innerHTML='<div class="crumb">'+a.crumb+'</div><article class="art"><h1>'+a.title+'</h1>'+a.body+sa+'</article>';
  m.scrollTop=0;window.scrollTo(0,0);
  // wire internal links
  m.querySelectorAll('a.ilink').forEach(function(l){l.onclick=function(e){e.preventDefault();go(l.dataset.s);};});
  m.querySelectorAll('.seealso a').forEach(function(l){l.onclick=function(e){e.preventDefault();go(l.dataset.s);};});
}
function relatedChips(slug){
  var a=BYSLUG[slug];if(!a.rel||!a.rel.length)return '';
  var c=a.rel.map(function(s){var t=BYSLUG[s];return t?'<a data-s="'+s+'">'+t.title+'</a>':'';}).join('');
  return '<div class="seealso"><b>Siehe auch</b><div class="chips">'+c+'</div></div>';
}
// ---- search ----
function strip(s){return (s||'').replace(/<[^>]+>/g,' ');}
document.getElementById('search').addEventListener('input',function(e){
  var q=e.target.value.trim().toLowerCase();
  if(!q){var h=location.hash.slice(1);go(BYSLUG[h]?h:APP.articles[0].slug);return;}
  var hits=APP.articles.filter(function(a){return (a.title+' '+strip(a.body)).toLowerCase().indexOf(q)>-1;}).slice(0,40);
  var m=document.getElementById('main');
  m.innerHTML='<div class="crumb">Suche</div><h1 class="art" style="font-size:24px;margin:0 0 14px">'+hits.length+' Treffer für „'+e.target.value+'"</h1><div class="results"></div>';
  var box=m.querySelector('.results');
  hits.forEach(function(a){var b=document.createElement('button');b.className='alink';b.dataset.s=a.slug;b.textContent=a.title;b.onclick=function(){go(a.slug);};box.appendChild(b);});
  if(!hits.length)m.querySelector('.results').innerHTML='<p class="muted">Nichts gefunden.</p>';
});
// ---- mobile ----
function closeSide(){document.getElementById('side').classList.remove('open');document.getElementById('backdrop').classList.remove('open');}
document.getElementById('menubtn').onclick=function(){document.getElementById('side').classList.toggle('open');document.getElementById('backdrop').classList.toggle('open');};
document.getElementById('backdrop').onclick=closeSide;
// ---- init ----
document.getElementById('logo').onclick=function(){go(APP.articles[0].slug);closeSide();};
initTheme();buildSidebar();
var start=location.hash.slice(1);go(BYSLUG[start]?start:APP.articles[0].slug);
window.addEventListener('hashchange',function(){var h=location.hash.slice(1);if(h&&BYSLUG[h])go(h);});
</script>
</body>
</html>
